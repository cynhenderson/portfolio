<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ego Diagnostic // LXD Edition</title>
  <style>
    /* --- CSS VARIABLES & RESET --- */
    :root {
      --bg-color: #FAFAFA;
      --text-color: #111111;
      --accent-color: #FF3300;
      --font-heading: "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "Space Mono", "JetBrains Mono", monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-heading);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- AESTHETIC ELEMENTS (NOISE & SHAPES) --- */
    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 9999; opacity: 0.04;
      background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }

    .abstract-shape {
      position: fixed; z-index: -1; opacity: 0.05;
      background: var(--text-color);
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      animation: morph 15s ease-in-out infinite alternate;
    }
    .shape-1 { width: 60vw; height: 60vw; top: -10vw; left: -10vw; }
    
    @keyframes morph {
      0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
      100% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
    }

    /* --- TRANSITIONS & ANIMATIONS --- */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .animate-in {
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }

    /* --- LAYOUT & TYPOGRAPHY --- */
    #app {
      width: 90%; max-width: 900px; z-index: 10; padding: 4rem 0;
    }

    h1, h2 {
      font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 2rem;
    }
    h1 { font-size: clamp(2.5rem, 5vw, 4rem); margin-left: -5px; }
    
    .mono { font-family: var(--font-mono); font-size: 0.85rem; text-transform: uppercase; }

    /* --- INTERACTIVE ELEMENTS --- */
    .option-btn {
      display: block; width: 100%; text-align: left;
      background: transparent; border: 1px solid #CCC;
      padding: 1.5rem; margin-bottom: 1rem; cursor: pointer;
      font-family: var(--font-mono); font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    .option-btn:hover {
      background: var(--text-color); color: var(--bg-color); border-color: var(--text-color);
    }

    .toggle-container { margin-top: 3rem; display: flex; gap: 1rem; }
    .toggle-btn {
      padding: 1rem 3rem; background: transparent; border: 2px solid var(--text-color);
      cursor: pointer; font-weight: bold; font-family: var(--font-mono);
      transition: all 0.3s ease;
    }
    .toggle-btn:hover { background: var(--text-color); color: var(--bg-color); }

    /* --- REFINED SUBJECTIVITY DIAL --- */
    #dial-container {
      position: fixed; bottom: 2rem; right: 2rem;
      text-align: right; z-index: 100;
      pointer-events: none;
      display: none; 
    }
    #dial-value { 
      font-size: 2rem; 
      font-weight: bold; 
      transition: color 0.4s ease, transform 0.4s ease; 
    }
    #dial-tooltip {
      font-size: 0.75rem; max-width: 250px; margin-top: 0.5rem;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      color: var(--accent-color);
      line-height: 1.4;
    }
    
    body.is-judging #dial-tooltip { 
      opacity: 1; 
      transform: translateY(0); 
    }

    /* --- HUD & SCANLINE OVERLAYS --- */
    .scanline-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0) 50%,
        rgba(17,17,17,0.04) 50%,
        rgba(17,17,17,0.04)
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9998;
      animation: scan drift 10s linear infinite;
    }

    @keyframes drift {
      0% { background-position: 0 0; }
      100% { background-position: 0 100vh; }
    }

    .hud-corner {
      position: fixed;
      width: 40px; height: 40px;
      border: 2px solid var(--text-color);
      opacity: 0.15;
      pointer-events: none;
      z-index: 9997;
      transition: border-color 0.3s ease, opacity 0.3s ease;
    }

    .hud-tl { top: 1rem; left: 1rem; border-right: none; border-bottom: none; }
    .hud-tr { top: 1rem; right: 1rem; border-left: none; border-bottom: none; }
    .hud-bl { bottom: 1rem; left: 1rem; border-right: none; border-top: none; }
    .hud-br { bottom: 1rem; right: 1rem; border-left: none; border-top: none; }

    .hud-coords {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-color);
      opacity: 0.3;
      pointer-events: none;
      z-index: 9997;
      text-align: center;
      transition: color 0.3s ease, opacity 0.3s ease;
    }

    body.is-judging .hud-corner {
      border-color: var(--accent-color);
      opacity: 0.8;
    }
    
    body.is-judging .hud-coords {
      color: var(--accent-color);
      opacity: 0.8;
    }

    /* --- BOOT SEQUENCE & CONSENT CHECKBOX --- */
    #terminal-boot {
      height: 60px; 
      color: var(--accent-color); 
      margin-bottom: 1rem; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-end; 
      overflow: hidden;
      font-size: 0.75rem;
    }

    .brutalist-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      margin-bottom: 2.5rem;
      opacity: 0.6;
      transition: opacity 0.3s ease;
      text-transform: uppercase;
    }

    .brutalist-checkbox:hover { opacity: 1; }
    .brutalist-checkbox input { display: none; }
    
    .checkmark {
      width: 24px; height: 24px;
      border: 2px solid var(--text-color);
      display: inline-block;
      position: relative;
      transition: border-color 0.2s;
    }

    .brutalist-checkbox input:checked + .checkmark {
      border-color: var(--accent-color);
    }

    .brutalist-checkbox input:checked + .checkmark::after {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      background: var(--accent-color);
    }

    .toggle-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
      border-color: var(--text-color);
      color: var(--text-color);
    }

    .toggle-btn.active {
      opacity: 1;
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .toggle-btn.active:hover {
      background: var(--accent-color);
      color: var(--bg-color);
    }

    /* --- ARCHETYPE DOSSIER (RESULTS CARD) --- */
    .dossier-card {
      border: 2px solid var(--text-color);
      background: var(--bg-color);
      padding: 2.5rem;
      position: relative;
      margin-top: 1rem;
      box-shadow: 12px 12px 0px rgba(17, 17, 17, 0.1); 
    }

    .dossier-header {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 2.5rem;
      border-bottom: 2px solid var(--text-color);
      padding-bottom: 2rem;
      margin-bottom: 2rem;
      align-items: center;
    }

    .dossier-icon {
      width: 100px;
      height: 100px;
    }

    .dossier-title {
      font-size: clamp(2rem, 4vw, 3rem);
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.5rem !important; 
    }

    .dossier-meta {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent-color);
      margin-bottom: 0.5rem;
    }

    .dossier-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
    }

    @media (max-width: 600px) {
      .dossier-header { grid-template-columns: 1fr; text-align: center; }
      .dossier-icon { margin: 0 auto; }
      .dossier-grid { grid-template-columns: 1fr; gap: 1.5rem; }
    }

    .dossier-section {
      border-top: 1px solid rgba(17, 17, 17, 0.2);
      padding-top: 1rem;
    }

    .dossier-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent-color);
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .dossier-warning {
      background: var(--text-color);
      color: var(--bg-color);
      padding: 1.5rem;
      margin-top: 3rem;
      font-family: var(--font-mono);
    }
    
    .dossier-warning .dossier-label {
      color: var(--accent-color);
    }

    /* --- UTILITIES --- */
    .hidden { display: none !important; }
    .system-text { border: 1px solid var(--text-color); padding: 1rem; margin-top: 1.5rem; }

    /* --- ESCAPE HATCH (FOOTER) --- */
    #escape-hatch {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      text-decoration: none;
      color: var(--text-color);
      opacity: 0.4;
      z-index: 100;
      transition: opacity 0.3s ease, color 0.3s ease;
    }
    
    #escape-hatch:hover {
      opacity: 1;
      color: var(--accent-color);
    }
  </style>
</head>

          blindspot: "Avoiding the hard conversations. Sometimes a design needs a strong, opinionated direction to be effective.",
          anti: "Type 3 (The Achiever)",
          growth: "System Update 9.0: Tell a stakeholder 'no' or 'that won't work' today instead of saying 'let me see what I can do.'",
          icon: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="40" ry="15" stroke="currentColor" stroke-width="4" fill="none"/><ellipse cx="50" cy="50" rx="15" ry="40" stroke="var(--accent-color)" stroke-width="4" fill="none"/></svg>`
        }
      }
    };

    const appEl = document.getElementById('app');
    const dialValueEl = document.getElementById('dial-value');

    // --- HUD COORDINATE LOGIC ---
    const coordsEl = document.getElementById('hud-coords');
    setInterval(() => {
      const r1 = (Math.random() * 99).toFixed(2).padStart(5, '0');
      const r2 = (Math.random() * 99).toFixed(2).padStart(5, '0');
      coordsEl.innerText = `SYS.TRK // ${r1} . ${r2} // OPR.ACTIVE`;
    }, 1200);

    // --- REFINED SUBJECTIVITY DIAL LOGIC ---
    document.addEventListener('mouseover', (e) => {
      if (e.target.classList.contains('option-btn')) {
        document.body.classList.add('is-judging');
        const randomVal = Math.floor(Math.random() * (99 - 92 + 1)) + 92; 
        dialValueEl.innerText = `${randomVal}%`;
        dialValueEl.style.color = 'var(--accent-color)';
      }
    });

    document.addEventListener('mouseout', (e) => {
      if (e.target.classList.contains('option-btn')) {
        document.body.classList.remove('is-judging');
        dialValueEl.innerText = '85%';
        dialValueEl.style.color = 'var(--text-color)';
      }
    });

    // --- VIEWS ---
    function renderIntro() {
      document.getElementById('dial-container').style.display = 'none';
      appEl.innerHTML = `
        <div class="animate-in">
          
          <div id="terminal-boot" class="mono stagger-1">
             </div>

          <h1 class="stagger-2 animate-in" style="font-size: clamp(3.5rem, 8vw, 6rem); text-transform: uppercase; line-height: 0.85; letter-spacing: -0.05em; margin-bottom: 2.5rem;">
            Ego<br>Diagnostic<br><span style="font-size: 0.4em; color: var(--accent-color); letter-spacing: 0;">[LXD EDITION]</span>
          </h1>
          
          <p class="stagger-3 animate-in" style="font-size: 1.2rem; max-width: 600px; margin-bottom: 3rem; font-weight: 300; line-height: 1.5; border-left: 2px solid var(--accent-color); padding-left: 1.5rem;">
            A mildly invasive tool designed to categorize your instructional neuroses into a sterile geometric framework. Do not expect validation.
          </p>
          
          <div class="stagger-3 animate-in">
<label class="brutalist-checkbox">
                <input type="checkbox" id="consent-check" onchange="document.getElementById('start-btn').disabled = !this.checked; document.getElementById('start-btn').classList.toggle('active')">
                <span class="checkmark"></span>
                I acknowledge that my instructional strategy is a defense mechanism against scope creep.
              </label>
              <br>
              <button id="start-btn" class="toggle-btn" disabled onclick="renderQ1()">[ INITIATE SEQUENCE ]</button>
          </div>

        </div>
      `;

      // --- Terminal Boot Sequence Animation ---
      const terminal = document.getElementById('terminal-boot');
      const lines = [
        "> INITIALIZING NEUROTIC FRAMEWORK...",
        "> BYPASSING EMPATHY PROTOCOLS...",
        "> CALIBRATING JUDGMENT ENGINE...",
        "> SYSTEM READY. AWAITING SUBJECT CONSENT."
      ];
      
      let delay = 0;
      lines.forEach((line, index) => {
        setTimeout(() => {
          const p = document.createElement('div');
          p.innerText = line;
          terminal.appendChild(p);
          if (terminal.children.length > 3) {
            terminal.removeChild(terminal.firstChild);
          }
        }, delay);
        delay += 500; 
      });
    }

    function renderQ1() {
      document.getElementById('dial-container').style.display = 'block';
      appEl.innerHTML = `
        <div class="animate-in">
          <div class="mono" style="margin-bottom: 1rem;">PHASE 01 // STANCE</div>
          <h1>Observe your internal movement when collaboration with a difficult SME inevitably goes off the rails. Which best describes your maneuver?</h1>
          <button class="option-btn" onclick="handleQ1('A')">[A] I push forward, assert control of the meeting, and move against the resistance to get results.</button>
          <button class="option-btn" onclick="handleQ1('B')">[B] I detach, protect my energy, and move away from the chaos to process the content on my own.</button>
          <button class="option-btn" onclick="handleQ1('C')">[C] I look for consensus or structure. I rely on the project plan to stabilize the situation.</button>
        </div>
      `;
    }

    function renderQ2() {
      appEl.innerHTML = `
        <div class="animate-in">
          <div class="mono" style="margin-bottom: 1rem;">PHASE 02 // CENTER</div>
          <h1>When pushed to your absolute limit during a project crunch, what is your default error state?</h1>
          <button class="option-btn" onclick="handleQ2('X')">[X] Frustration, annoyance, or a rigid need to control the deliverables.</button>
          <button class="option-btn" onclick="handleQ2('Y')">[Y] Feeling unappreciated, or hyper-focusing on how leadership perceives my contribution.</button>
          <button class="option-btn" onclick="handleQ2('Z')">[Z] Anxiety, overthinking the logic, or frantically searching for a workaround.</button>
        </div>
      `;
    }

    function renderQ3() {
      const data = typeData[state.coreType];
      appEl.innerHTML = `
        <div class="animate-in">
          <div class="mono" style="margin-bottom: 1rem;">PHASE 03 // CALIBRATION</div>
          <h1>${data.wingPrompt}</h1>
          <button class="option-btn" onclick="handleQ3('${data.wingOptions[0].value}')">${data.wingOptions[0].text}</button>
          <button class="option-btn" onclick="handleQ3('${data.wingOptions[1].value}')">${data.wingOptions[1].text}</button>
        </div>
      `;
    }

    function renderCringe() {
      const data = typeData[state.coreType];
      appEl.innerHTML = `
        <div class="animate-in">
          <div class="mono" style="margin-bottom: 1rem; color: var(--accent-color);">SYSTEM HALT // VIBE CHECK</div>
          <h1>${data.flaw}</h1>
          <div class="toggle-container">
            <button class="toggle-btn" onclick="handleCringe(true)">Is this slightly too accurate? [YES]</button>
            <button class="toggle-btn" onclick="handleCringe(false)">[NO]</button>
          </div>
          <div id="cringe-readout" class="mono system-text hidden"></div>
        </div>
      `;
    }

    function renderResults() {
      const data = typeData[state.coreType];
      const wingDesc = data.results.wings[state.wing];
      appEl.innerHTML = `
        <div class="animate-in">
          <div class="mono" style="margin-bottom: 1rem;">DIAGNOSTIC COMPLETE // DOSSIER GENERATED</div>

          <div class="dossier-card">
            <div class="dossier-header">
              <div class="dossier-icon">${data.results.icon}</div>
              <div>
                <div class="dossier-meta">SUBJECT ARCHETYPE // TYPE ${state.coreType}</div>
                <h1 class="dossier-title">${data.results.name}</h1>
                <h2 style="font-weight: 400; font-size: 1.2rem; margin: 0;">${wingDesc}</h2>
              </div>
            </div>

            <div class="dossier-grid">
              <div class="dossier-section">
                <div class="dossier-label">LXD SUPERPOWER</div>
                <p style="margin: 0; line-height: 1.5;">${data.results.superpower}</p>
              </div>
              <div class="dossier-section">
                <div class="dossier-label">LXD BLINDSPOT</div>
                <p style="margin: 0; line-height: 1.5;">${data.results.blindspot}</p>
              </div>
            </div>

            <div class="dossier-warning">
              <div class="dossier-label">WARNING: SHADOW STATE DETECTED -> ${data.results.anti}</div>
              <p style="margin: 0; font-size: 0.95rem; line-height: 1.5;">${data.results.growth}</p>
            </div>
          </div>

          <button class="toggle-btn" style="margin-top: 3rem;" onclick="restartApp()">[ SYSTEM REBOOT // START OVER ]</button>
        </div>
      `;
    }

    // --- HANDLERS ---
    window.handleQ1 = (val) => { state.stance = val; renderQ2(); };
    window.handleQ2 = (val) => { 
      state.center = val; 
      state.coreType = intersectionMatrix[state.stance][state.center];
      renderQ3(); 
    };
    window.handleQ3 = (val) => { state.wing = val; renderCringe(); };
    
    window.handleCringe = (isHurt) => {
      const readout = document.getElementById('cringe-readout');
      readout.classList.remove('hidden');
      
      if(isHurt) {
        readout.style.borderColor = "green";
        readout.style.color = "green";
        readout.innerHTML = "> Self-awareness acknowledged. Generating constructive results...";
      } else {
        readout.style.borderColor = "var(--accent-color)";
        readout.style.color = "var(--accent-color)";
        readout.innerHTML = "> Defensive shields detected. Recalibrating Subjectivity Dial... Proceeding anyway.";
        document.body.classList.add('is-judging');
        dialValueEl.innerText = "99%";
        dialValueEl.style.color = "var(--accent-color)";
      }

      setTimeout(() => { renderResults(); }, 2500);
    };

    window.restartApp = () => {
      state.stance = null;
      state.center = null;
      state.coreType = null;
      state.wing = null;
      
      document.body.classList.remove('is-judging');
      dialValueEl.innerText = '85%';
      dialValueEl.style.color = 'var(--text-color)';
      
      renderIntro();
    };

    // Initialize App
    renderIntro();

  </script>
</body>
</html>
