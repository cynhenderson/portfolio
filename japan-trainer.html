<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Family Adventure!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fcfaf5;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        .handwriting { font-family: 'Kalam', cursive; }

        .paper-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.05);
            border: 1px solid #f3f4f6;
            position: relative;
        }

        .washi-tape {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            width: 80px;
            height: 20px;
            background-color: rgba(253, 186, 116, 0.6);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .washi-tape.mint { background-color: rgba(167, 243, 208, 0.6); transform: translateX(-50%) rotate(1deg); }
        .washi-tape.lavender { background-color: rgba(221, 214, 254, 0.6); transform: translateX(-50%) rotate(-1deg); }

        .btn-pastel {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .btn-pastel:active { transform: scale(0.95); }

        .sprite-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05), inset 0 2px 4px rgba(255,255,255,0.5);
            position: relative;
            flex-shrink: 0;
        }
        
        .sprite-circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
            z-index: 2;
        }

        .progress-dots { display: flex; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #e5e7eb; }
        .dot.filled { background: #34d399; }

        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .bounce-soft { animation: bounce-soft 1s ease-in-out infinite; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <audio id="global-audio-player"></audio>

    <div class="w-full max-w-md flex justify-between items-center mb-6 paper-card p-3 px-5">
        <div>
            <div class="text-xs font-bold text-gray-400 tracking-wider uppercase">Japan Trip 2026</div>
            <div class="font-bold text-lg text-indigo-400" id="total-progress">Mastery: 0%</div>
        </div>
        <div class="sprite-circle bg-yellow-200 bounce-soft w-16 h-16">
            <img src="photos/sprite-dog-neutral.png" alt="Dog" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display:none;" class="text-2xl absolute">🐕</span>
        </div>
    </div>

    <main id="game-container" class="w-full max-w-md h-[550px] flex flex-col">
    </main>

    <div id="nav-bar" class="w-full max-w-md mt-6 flex justify-between items-center gap-4">
        <button onclick="showDashboard()" class="btn-pastel bg-white text-gray-600 shadow-sm border-gray-100 flex-1 text-sm flex items-center justify-center gap-2">
            <span>📓</span> Study Guide
        </button>
        <button onclick="resetData()" class="btn-pastel bg-red-50 text-red-400 shadow-sm border-red-100 text-xs px-4">
            Reset
        </button>
    </div>

    <script>
        const PHRASES = [
            // Basics
            { id: 1, type: 'phrase', character: 'cynthia', cat: 'Basics', text: 'Sumimasen', romaji: 'Soo-mee-mah-sen', context: 'Start ANY interaction. It means "Excuse me."', audio: 'sounds/sumimasen.mp3', level: 0 },
            { id: 2, type: 'phrase', character: 'mom', cat: 'Basics', text: 'Arigato gozaimasu', romaji: 'Ah-ree-gah-toh go-zye-mahs', context: '"Thank you." Politeness is key!', audio: 'sounds/arigato-gozaimasu.mp3', level: 0 },
            { id: 3, type: 'phrase', character: 'dad', cat: 'Basics', text: 'Daijoubu desu', romaji: 'Die-joe-boo dess', context: '"I’m okay / No thank you." Use a small hand wave.', audio: 'sounds/daijoubu-desu.mp3', level: 0 },
            { id: 4, type: 'phrase', character: 'mom', cat: 'Basics', text: 'Wakarimasen', romaji: 'Wah-kah-ree-mah-sen', context: '"I don\'t understand." Say this if you are confused.', audio: 'sounds/wakarimasen.mp3', level: 0 },
            { id: 11, type: 'phrase', character: 'dad', cat: 'Basics', text: 'Hai', romaji: 'High', context: '"Yes."', audio: 'sounds/hai.mp3', level: 0 },
            { id: 12, type: 'phrase', character: 'mom', cat: 'Basics', text: 'Iie', romaji: 'Ee-eh', context: '"No."', audio: 'sounds/iie.mp3', level: 0 },
            
            // Greetings
            { id: 13, type: 'phrase', character: 'mom', cat: 'Greetings', text: 'Ohayou gozaimasu', romaji: 'Oh-hah-yoh go-zye-mahs', context: '"Good morning."', audio: 'sounds/ohayou-gozaimasu.mp3', level: 0 },
            { id: 14, type: 'phrase', character: 'cynthia', cat: 'Greetings', text: 'Konnichiwa', romaji: 'Kohn-nee-chee-wah', context: '"Hello / Good day."', audio: 'sounds/konnichiwa.mp3', level: 0 },
            { id: 15, type: 'phrase', character: 'cynthia', cat: 'Greetings', text: 'Konbanwa', romaji: 'Kohn-bahn-wah', context: '"Good evening."', audio: 'sounds/konbanwa.mp3', level: 0 },

            // Dining
            { id: 5, type: 'phrase', character: 'dad', cat: 'Dining', text: 'Kore o kudasai', romaji: 'Koh-reh oh koo-dah-sigh', context: '"This one, please." Point at the menu!', audio: 'sounds/kore-o-kudasai.mp3', level: 0 },
            { id: 6, type: 'phrase', character: 'mom', cat: 'Dining', text: 'O-mizu o kudasai', romaji: 'Oh-mee-zoo oh koo-dah-sigh', context: '"Water, please."', audio: 'sounds/o-mizu-o-kudasai.mp3', level: 0 },
            { id: 7, type: 'phrase', character: 'dad', cat: 'Dining', text: 'O-kaikei o onegaishimasu', romaji: 'Oh-kye-kay oh oh-nay-guy-shee-mahs', context: '"The check/bill, please."', audio: 'sounds/o-kaikei-onegaishimasu.mp3', level: 0 },

            // Essential Signs
            { id: 8, type: 'sign', character: 'cynthia', cat: 'Signs', text: '入口', romaji: 'Iriguchi', context: 'ENTRANCE', audio: null, level: 0 },
            { id: 9, type: 'sign', character: 'cynthia', cat: 'Signs', text: '出口', romaji: 'Deguchi', context: 'EXIT', audio: null, level: 0 },
            { id: 16, type: 'sign', character: 'mom', cat: 'Signs', text: '男', romaji: 'Otoko', context: 'MEN (Restroom)', audio: null, level: 0 },
            { id: 17, type: 'sign', character: 'mom', cat: 'Signs', text: '女', romaji: 'Onna', context: 'WOMEN (Restroom)', audio: null, level: 0 },
            { id: 18, type: 'sign', character: 'dad', cat: 'Signs', text: '押', romaji: 'Osu', context: 'PUSH (Door)', audio: null, level: 0 },
            { id: 19, type: 'sign', character: 'dad', cat: 'Signs', text: '引', romaji: 'Hiki', context: 'PULL (Door)', audio: null, level: 0 },
            { id: 20, type: 'sign', character: 'cynthia', cat: 'Signs', text: '辛', romaji: 'Karai', context: 'SPICY', audio: null, level: 0 },
            { id: 21, type: 'sign', character: 'cynthia', cat: 'Signs', text: '円', romaji: 'Yen', context: 'PRICE SYMBOL', audio: null, level: 0 }
        ];

        let state = { phrases: [], currentPhrase: null };

        const CHARACTERS = {
            cynthia: { name: 'Cynthia', img: 'photos/sprite-cynthia.png', fallback: '👩‍🎤', color: 'bg-purple-200' },
            mom: { name: 'Mom', img: 'photos/sprite-mom.png', fallback: '👩‍🎨', color: 'bg-pink-200' },
            dad: { name: 'Dad', img: 'photos/sprite-dad.png', fallback: '👨‍🍳', color: 'bg-blue-200' },
            dog: { name: 'Hype Dog', img: 'photos/sprite-dog-neutral.png', happyImg: 'photos/sprite-dog-happy.png', fallback: '🐕', color: 'bg-yellow-200' }
        };

        function init() {
            const saved = localStorage.getItem('japan_trip_progress');
            if (saved) {
                state.phrases = JSON.parse(saved);
                PHRASES.forEach(p => {
                    if (!state.phrases.find(sp => sp.id === p.id)) state.phrases.push(p);
                });
            } else {
                state.phrases = [...PHRASES];
            }
            updateTotalProgress();
            showDashboard();
        }

        function save() {
            localStorage.setItem('japan_trip_progress', JSON.stringify(state.phrases));
            updateTotalProgress();
        }

        function updateTotalProgress() {
            const mastered = state.phrases.filter(p => p.level >= 3).length;
            const percent = Math.floor((mastered / state.phrases.length) * 100);
            document.getElementById('total-progress').innerText = `Mastery: ${percent}%`;
        }

        function resetData() {
            if (confirm("Erase progress and start over?")) {
                localStorage.removeItem('japan_trip_progress');
                location.reload();
            }
        }

        function playAudio(src) {
            const player = document.getElementById('global-audio-player');
            player.src = src;
            player.play().catch(e => console.log("Audio issues:", e));
        }

        function showDashboard() {
            const container = document.getElementById('game-container');
            const categories = [...new Set(state.phrases.map(p => p.cat))];
            const washiColors = ['mint', 'lavender', '', 'mint'];
            
            let html = `<div class="fade-in overflow-y-auto pr-2 pb-4 h-full">
                        <h2 class="handwriting text-2xl text-center text-gray-500 mb-6 mt-2">Let's practice!</h2>
                        <div class="grid gap-6">`;

            categories.forEach((cat, index) => {
                const catPhrases = state.phrases.filter(p => p.cat === cat);
                const maxLevel = catPhrases.length * 3;
                const currentLevel = catPhrases.reduce((sum, p) => sum + p.level, 0);
                const catMastery = Math.floor((currentLevel / maxLevel) * 100);
                const washiClass = washiColors[index % washiColors.length];

                html += `
                    <div class="paper-card p-5 cursor-pointer transform hover:-translate-y-1 transition-transform" onclick="startCategory('${cat}')">
                        <div class="washi-tape ${washiClass}"></div>
                        <div class="flex justify-between items-center mb-3 mt-1">
                            <span class="font-bold text-xl text-gray-700">${cat}</span>
                            <span class="handwriting text-xl text-gray-400">${catMastery}%</span>
                        </div>
                        <div class="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-indigo-300 rounded-full" style="width: ${catMastery}%"></div>
                        </div>
                    </div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function startCategory(cat) {
            const pool = state.phrases.filter(p => p.cat === cat);
            const sorted = pool.sort((a, b) => a.level - b.level);
            state.currentPhrase = sorted[0];
            showLesson();
        }

        function showLesson() {
            const container = document.getElementById('game-container');
            const p = state.currentPhrase;
            const char = CHARACTERS[p.character];
            const isSign = p.type === 'sign';

            let dotsHtml = '';
            for(let i=0; i<3; i++) {
                dotsHtml += `<div class="dot ${i < p.level ? 'filled' : ''}"></div>`;
            }

            container.innerHTML = `
                <div class="fade-in flex flex-col h-full">
                    <div class="flex-grow flex flex-col justify-center items-center mb-4">
                        
                        <div class="paper-card p-6 w-full mb-8">
                            <div class="washi-tape"></div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-indigo-50 text-indigo-400 text-xs font-bold px-2 py-1 rounded-md uppercase tracking-wider">${p.cat}</span>
                                <div class="progress-dots mt-1">${dotsHtml}</div>
                            </div>
                            
                            <h1 class="font-bold text-4xl text-center mb-2 text-gray-800">${p.text}</h1>
                            <p class="handwriting text-3xl text-center text-pink-500 mb-2">${p.romaji}</p>
                            
                            ${p.audio && !isSign ? `
                                <div class="flex justify-center gap-3 mb-6">
                                    <button onclick="playAudio('${p.audio}')" class="bg-blue-50 text-blue-500 hover:bg-blue-100 px-4 py-2 rounded-full flex items-center gap-2 text-sm font-bold transition-colors border border-blue-100 shadow-sm">
                                        🔊 Listen
                                    </button>
                                    <button onclick="playAudio('${p.audio.replace('.mp3', '-slow.mp3')}')" class="bg-indigo-50 text-indigo-500 hover:bg-indigo-100 px-4 py-2 rounded-full flex items-center gap-2 text-sm font-bold transition-colors border border-indigo-100 shadow-sm">
                                        🐢 Slower
                                    </button>
                                </div>
                            ` : '<div class="mb-6"></div>'}

                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <p class="text-sm text-gray-600 font-medium">💡 ${p.context}</p>
                            </div>
                        </div>

                        <div class="flex items-center self-start ml-2 w-full">
                            <div class="sprite-circle ${char.color}">
                                <img src="${char.img}" alt="${char.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <span style="display:none;" class="text-4xl absolute">${char.fallback}</span>
                            </div>
                            <div class="ml-3 bg-white px-4 py-2 rounded-2xl shadow-sm border border-gray-100 relative max-w-[220px]">
                                <span class="font-bold text-gray-600 text-sm">
                                    ${isSign ? 'Look closely and memorize this sign!' : 'Tap the button when you say it!'}
                                </span>
                                <div class="absolute -left-2 top-1/2 transform -translate-y-1/2 w-0 h-0 border-t-[8px] border-t-transparent border-b-[8px] border-b-transparent border-r-[8px] border-r-white"></div>
                            </div>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button onclick="advanceMastery()" class="btn-pastel w-full py-4 text-xl bg-green-400 text-white shadow-md hover:bg-green-500">
                             ${isSign ? "I've memorized it! ✨" : "I said it out loud! ✨"}
                        </button>
                    </div>
                </div>
            `;
        }

        function advanceMastery() {
            const p = state.phrases.find(item => item.id === state.currentPhrase.id);
            p.level = Math.min(p.level + 1, 3);
            save();
            showFeedback();
        }

        function nextPhrase() {
            const pool = state.phrases; // Use the entire deck instead of just the current category
            const unmastered = pool.filter(p => p.level < 3);
            
            if (unmastered.length > 0) {
                // Prioritize phrases that need the most practice globally
                const sorted = unmastered.sort((a, b) => a.level - b.level);
                // Avoid showing the exact same phrase back-to-back if there are other unmastered ones
                const nextOptions = sorted.filter(p => p.id !== state.currentPhrase.id);
                state.currentPhrase = nextOptions.length > 0 ? nextOptions[0] : sorted[0];
            } else {
                // If all mastered, pick a random phrase to review from any category
                const others = pool.filter(p => p.id !== state.currentPhrase.id);
                state.currentPhrase = others.length > 0 ? others[Math.floor(Math.random() * others.length)] : pool[0];
            }
            showLesson();
        }

        function showFeedback() {
            const container = document.getElementById('game-container');
            const dog = CHARACTERS.dog;
            const words = ["Subarashii!", "Sugoi!", "Yatta!", "Perfect!"];
            const word = words[Math.floor(Math.random() * words.length)];

            container.innerHTML = `
                <div class="fade-in flex flex-col items-center justify-center h-full text-center">
                    <div class="sprite-circle ${dog.color} w-40 h-40 bounce-soft mb-6 shadow-md">
                        <img src="${dog.happyImg}" alt="Happy Dog" class="drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none;" class="text-6xl absolute">${dog.fallback}</span>
                    </div>
                    
                    <h1 class="handwriting text-5xl text-pink-500 mb-4">${word}</h1>
                    
                    <div class="paper-card p-6 mb-8 w-full max-w-[80%]">
                        <p class="font-bold text-gray-600 mb-2">Note memorized!</p>
                        <p class="text-sm text-gray-400">Current Level: ${state.currentPhrase.level}/3</p>
                    </div>

                    <button onclick="nextPhrase()" class="btn-pastel bg-indigo-400 text-white w-full py-4 text-lg shadow-md hover:bg-indigo-500">
                        Next Phrase ➔
                    </button>
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
