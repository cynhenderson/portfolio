<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilly Ate That!</title>
    
    <!-- Link Preview Meta Tags for iMessage / Social Media -->
    <meta property="og:title" content="Lilly Ate That!">
    <meta property="og:description" content="Help Lilly catch the falling seafood and defeat the bosses in this cute arcade game!">
    <meta property="og:image" content="photos/lilly.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lilly Ate That!">
    <meta name="twitter:description" content="Help Lilly catch the falling seafood and defeat the bosses!">
    <meta name="twitter:image" content="photos/lilly.png">
    <meta name="theme-color" content="#ff758c">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #a8edea 0%, #fed6e3 100%);
            color: #ff758c;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            touch-action: none; 
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            z-index: 10;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 {
            color: #ff758c;
            text-shadow: 3px 3px #ffb7b2;
            font-size: 48px;
            margin-bottom: 10px;
            line-height: 1.2;
            font-weight: 600;
            text-transform: uppercase;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            max-width: 80%;
            margin-bottom: 30px;
            color: #6c757d;
            font-weight: 600;
        }

        button {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            padding: 15px 40px;
            font-size: 22px;
            cursor: pointer;
            background-color: #ff758c;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px #ff4766;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px #ff4766;
        }

        .hud-text {
            font-size: 22px;
            color: #ff758c;
            font-weight: 600;
            text-shadow: 2px 2px white;
            z-index: 5;
            pointer-events: none;
            position: absolute;
        }

        #scoreBoard { top: 20px; left: 20px; }
        #comboBoard { top: 50px; left: 20px; color: #9b59b6; transition: transform 0.1s; }
        #livesBoard { top: 20px; right: 20px; }
        #highScoreBoard { 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #f39c12; 
        }

        .combo-pop { transform: scale(1.5) rotate(-5deg); }

        /* Boss Warning Flash */
        #warningOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(231, 76, 60, 0.3);
            z-index: 8;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #warningOverlay.active { opacity: 1; animation: flash 1s infinite alternate; }
        #warningText {
            font-size: 40px; color: white; text-shadow: 4px 4px #c0392b;
            font-weight: bold; text-align: center;
        }

        @keyframes flash {
            from { background: rgba(231, 76, 60, 0.2); }
            to { background: rgba(231, 76, 60, 0.5); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            p { font-size: 14px; }
            .hud-text { font-size: 18px; }
            #comboBoard { top: 45px; }
            #warningText { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="scoreBoard" class="hud-text">SCORE: <span id="scoreVal">0</span></div>
    <div id="comboBoard" class="hud-text">COMBO: <span id="comboVal">0</span></div>
    <div id="highScoreBoard" class="hud-text">🏆 HIGH: <span id="highScoreVal">0</span></div>
    <div id="livesBoard" class="hud-text">LIVES: <span id="livesVal">❤️❤️❤️</span></div>

    <div id="warningOverlay"><div id="warningText">GIANT SEAGULL<br>APPROACHING!</div></div>

    <div id="uiLayer">
        <h1 id="titleText">LILLY<br>ATE THAT!</h1>
        <p id="instructions">
            Drag to move!<br><br>
            CATCH: 🦞🍤🌟<br>
            AVOID: 💣🧪<br>
            POWER-UPS: 🛡️ (Shield) | 🧲 (Magnet)<br>
            BOSS: Aim under the boss and catch 🌶️ to fire!
        </p>
        <button id="startBtn">PLAY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CLOUD STORAGE ---
        let db, auth, user;
        let globalHighScore = 0;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lilly-ate-that';
        
        try {
            const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            if (Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app); db = getFirestore(app);
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                };
                initAuth();
                onAuthStateChanged(auth, async (u) => {
                    user = u;
                    if (user) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'gameData', 'stats');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().highScore) {
                            globalHighScore = docSnap.data().highScore;
                            document.getElementById('highScoreVal').innerText = globalHighScore;
                        }
                    }
                });
            }
        } catch (e) { console.log("Running without cloud saves."); }

        function saveHighScore(newScore) {
            if (newScore > globalHighScore) {
                globalHighScore = newScore;
                document.getElementById('highScoreVal').innerText = globalHighScore;
                if (user && db) setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'gameData', 'stats'), { highScore: globalHighScore }, { merge: true }).catch(e=>{});
            }
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('uiLayer');
        const startBtn = document.getElementById('startBtn');
        const titleText = document.getElementById('titleText');
        const instructions = document.getElementById('instructions');
        const scoreVal = document.getElementById('scoreVal');
        const comboVal = document.getElementById('comboVal');
        const livesVal = document.getElementById('livesVal');
        const comboBoard = document.getElementById('comboBoard');
        const warningOverlay = document.getElementById('warningOverlay');
        const warningText = document.getElementById('warningText');

        // --- AUDIO SYSTEM ---
        const bgMusic = new Audio('sounds/gameboy.mp3');
        bgMusic.loop = true; bgMusic.volume = 0.2; 

        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSound(type, comboCount = 0) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'catch') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400 + (comboCount * 30), now);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'hurt') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'golden') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.setValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'combo') {
                osc.type = 'square'; gainNode.gain.setValueAtTime(0.1, now);
                osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.1); 
                osc.frequency.setValueAtTime(659.25, now + 0.2); osc.frequency.setValueAtTime(880, now + 0.3); 
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6); osc.start(now); osc.stop(now + 0.6);
            } else if (type === 'powerup') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.linearRampToValueAtTime(1000, now + 0.2);
                gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'shield_break') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'boss_warning') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(600, now + 0.5);
                osc.frequency.linearRampToValueAtTime(300, now + 1.0);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 1.0);
                osc.start(now); osc.stop(now + 1.0);
            } else if (type === 'boss_hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(50, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        const playerImg = new Image(); playerImg.src = 'photos/lilly.png';

        // Game State
        let state = 'START';
        let score = 0, lives = 3, combo = 0, frameCount = 0;
        let animationId, screenShakeFrames = 0, freezeFrames = 0;

        // --- NEW BOSS PROFILES ---
        const bossProfiles = [
            { name: "GIANT SEAGULL", emoji: '🦅', speed: 4, moveType: 'linear', dropRateMod: 1 },
            { name: "SWAMP GATOR", emoji: '🐊', speed: 2, moveType: 'sine', dropRateMod: 1.2 },
            { name: "TRASH PANDA", emoji: '🦝', speed: 8, moveType: 'dart', dropRateMod: 0.7 } 
        ];

        let isBossBattle = false;
        let bossLevel = 1; 
        let nextBossScore = 300; 
        let boss = { x: 0, y: 100, baseY: 100, size: 120, hp: 1, maxHp: 1, vx: 4, emoji: '🦅', name: 'GIANT SEAGULL', moveType: 'linear', dropRateMod: 1, hurtFrames: 0, entryTimer: 0 };
        let lasers = [];

        const player = { x: 0, y: 0, size: 85, speed: 8, targetX: 0, img: playerImg, hurtFrames: 0, hasShield: false, magnetTimer: 0 };

        let items = [], floatingTexts = [], particles = [], confetti = [];

        const itemTypes = [
            { type: 'crawfish', emoji: '🦞', points: 10, prob: 0.40, isBad: false, isPowerup: false, isWeapon: false },
            { type: 'shrimp', emoji: '🍤', points: 5, prob: 0.35, isBad: false, isPowerup: false, isWeapon: false },
            { type: 'golden', emoji: '🌟', points: 50, prob: 0.04, isBad: false, isPowerup: false, isWeapon: false },
            { type: 'bomb', emoji: '💣', points: 0, prob: 0.09, isBad: true, isPowerup: false, isWeapon: false },
            { type: 'poison', emoji: '🧪', points: 0, prob: 0.09, isBad: true, isPowerup: false, isWeapon: false },
            { type: 'shield', emoji: '🛡️', points: 0, prob: 0.015, isBad: false, isPowerup: true, isWeapon: false },
            { type: 'magnet', emoji: '🧲', points: 0, prob: 0.015, isBad: false, isPowerup: true, isWeapon: false },
            { type: 'pepper', emoji: '🌶️', points: 0, prob: 0, isBad: false, isPowerup: false, isWeapon: true } 
        ];

        const keys = { ArrowLeft: false, ArrowRight: false };

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (state === 'START') { player.x = canvas.width / 2; player.targetX = player.x; }
            player.y = canvas.height - player.size - 20;
        }
        window.addEventListener('resize', resize); resize();
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });
        function handlePointer(e) {
            if (state !== 'PLAYING') return;
            player.targetX = e.touches ? e.touches[0].clientX : e.clientX;
        }
        canvas.addEventListener('mousedown', handlePointer);
        canvas.addEventListener('mousemove', (e) => { if(e.buttons > 0) handlePointer(e); });
        canvas.addEventListener('touchstart', handlePointer); canvas.addEventListener('touchmove', handlePointer);

        startBtn.addEventListener('click', () => {
            initAudio(); bgMusic.play().catch(e=>{});
            resetGame(); state = 'PLAYING'; uiLayer.classList.add('hidden'); loop();
        });

        function resetGame() {
            score = 0; lives = 3; combo = 0; frameCount = 0;
            items = []; floatingTexts = []; particles = []; confetti = []; lasers = [];
            screenShakeFrames = 0; freezeFrames = 0;
            player.x = canvas.width / 2; player.targetX = player.x;
            player.hasShield = false; player.magnetTimer = 0;
            isBossBattle = false; bossLevel = 1; nextBossScore = 300;
            warningOverlay.classList.remove('active');
            updateHUD();
        }

        function updateHUD() {
            scoreVal.innerText = score;
            livesVal.innerText = '❤️'.repeat(lives) || '💀';
            comboVal.innerText = combo;
            if (combo > 0) { comboBoard.classList.add('combo-pop'); setTimeout(() => comboBoard.classList.remove('combo-pop'), 100); }
        }

        function startBossPhase() {
            isBossBattle = true;
            
            const profileIndex = (bossLevel - 1) % bossProfiles.length;
            const bProfile = bossProfiles[profileIndex];
            
            boss.name = bProfile.name;
            boss.emoji = bProfile.emoji;
            boss.moveType = bProfile.moveType;
            boss.dropRateMod = bProfile.dropRateMod;
            boss.vx = bProfile.speed * (Math.random() > 0.5 ? 1 : -1);
            
            // Loop 1 (Boss 1-3) = 1 HP. Loop 2 (Boss 4-6) = 2 HP.
            boss.maxHp = 1 + Math.floor((bossLevel - 1) / 3); 
            boss.hp = boss.maxHp;
            
            boss.x = canvas.width / 2;
            boss.y = -100; 
            boss.baseY = 100;
            boss.entryTimer = 60;
            
            warningText.innerHTML = `${boss.name}<br>APPROACHING!`;
            playSound('boss_warning');
            warningOverlay.classList.add('active');
            setTimeout(() => { warningOverlay.classList.remove('active'); }, 3000);
            
            createExplosion(canvas.width/2, canvas.height/2, '#fff');
            items = []; 
        }

        function spawnItem() {
            if (isBossBattle) return; 
            
            if (score >= nextBossScore) {
                startBossPhase();
                return;
            }

            const spawnRate = Math.max(45, 120 - Math.floor(score / 25)); 
            
            if (frameCount % spawnRate === 0) {
                let rand = Math.random(), cumulativeProb = 0, selectedType = itemTypes[0];
                for (let type of itemTypes) {
                    cumulativeProb += type.prob;
                    if (rand <= cumulativeProb) { selectedType = type; break; }
                }
                const size = 40;
                const speedMultiplier = Math.min(2.5, 1 + (score / 1000));
                const baseSpeed = 1.0 + Math.random() * 1.5;

                items.push({
                    x: Math.random() * (canvas.width - size * 2) + size, y: -size, size: size,
                    speed: baseSpeed * speedMultiplier,
                    data: selectedType, rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 5
                });
            }
        }

        function spawnBossItem() {
            const dropRate = Math.max(15, Math.floor((45 - (bossLevel * 2)) * boss.dropRateMod)); 

            if (frameCount % dropRate === 0) {
                let rand = Math.random();
                let type;
                
                if (rand < 0.25) type = itemTypes.find(t => t.type === 'pepper'); 
                else if (rand < 0.60) type = itemTypes.find(t => t.type === 'bomb'); 
                else if (rand < 0.70) type = itemTypes.find(t => t.type === 'poison'); 
                else if (rand < 0.98) type = itemTypes.find(t => t.type === 'crawfish'); 
                else type = itemTypes.find(t => t.type === 'shield'); 
                
                items.push({
                    x: boss.x + (Math.random() * 60 - 30), y: boss.y + 40, size: 40,
                    speed: 3 + Math.random() * 2, 
                    data: type, rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 5
                });
            }
        }

        function addFloatingText(text, x, y, color, size = 20) {
            floatingTexts.push({ text: text, x: x, y: y, color: color, life: 40, size: size });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                    life: 30, maxLife: 30, color: color, size: Math.random() * 8 + 4
                });
            }
        }

        function spawnConfetti() {
            const colors = ['#ff758c', '#ffb7b2', '#a8edea', '#fed6e3', '#f39c12', '#2ecc71', '#9b59b6'];
            for (let i = 0; i < 80; i++) {
                confetti.push({
                    x: canvas.width / 2, y: player.y, vx: (Math.random() - 0.5) * 20, vy: (Math.random() * -15) - 5,
                    width: Math.random() * 10 + 5, height: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)], rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 10, life: 100
                });
            }
        }

        function checkCollisions() {
            const pBox = { left: player.x - player.size * 0.4, right: player.x + player.size * 0.4, top: player.y - player.size * 0.4, bottom: player.y + player.size * 0.4 };

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const iBox = { left: item.x - item.size * 0.4, right: item.x + item.size * 0.4, top: item.y - item.size * 0.4, bottom: item.y + item.size * 0.4 };

                if (pBox.left < iBox.right && pBox.right > iBox.left && pBox.top < iBox.bottom && pBox.bottom > iBox.top) {
                    
                    if (item.data.isWeapon) {
                        if (isBossBattle) {
                            playSound('powerup');
                            addFloatingText("FIRE!", player.x, player.y - 40, "#e74c3c");
                            
                            // NEW SKILL SHOT MECHANIC: Shoots straight up from player's current X position
                            lasers.push({ x: player.x, y: player.y, speed: 15 });
                        }
                    } else if (item.data.isBad) {
                        if (player.hasShield) {
                            player.hasShield = false; playSound('shield_break');
                            createExplosion(player.x, player.y, '#3498db'); addFloatingText("SAVED!", player.x, player.y - 40, "#3498db");
                        } else {
                            lives--; combo = 0; player.hurtFrames = 15; screenShakeFrames = 15; playSound('hurt');
                            addFloatingText("OUCH!", player.x, player.y - 40, "#e74c3c");
                            createExplosion(player.x, player.y, item.data.type === 'bomb' ? '#333333' : '#a8e6cf');
                            updateHUD(); if (lives <= 0) gameOver();
                        }
                    } else if (item.data.isPowerup) {
                        playSound('powerup');
                        if (item.data.type === 'shield') { player.hasShield = true; addFloatingText("SHIELD!", player.x, player.y - 40, "#3498db"); } 
                        else if (item.data.type === 'magnet') { player.magnetTimer = 300; addFloatingText("MAGNET!", player.x, player.y - 40, "#9b59b6"); }
                    } else {
                        combo++;
                        let multiplier = combo >= 20 ? 3 : (combo >= 10 ? 2 : 1);
                        let earnedPoints = item.data.points * multiplier; score += earnedPoints;

                        if (item.data.type === 'golden') playSound('golden'); else playSound('catch', Math.min(combo, 20)); 
                        addFloatingText("+" + earnedPoints, player.x, player.y - 40, "#2ecc71");

                        if (combo > 0 && combo % 10 === 0) {
                            freezeFrames = 10; playSound('combo'); spawnConfetti(); screenShakeFrames = 10;
                            addFloatingText("COMBO x" + combo + "!", canvas.width/2, canvas.height/2, "#9b59b6", 40);
                        }
                        updateHUD();
                    }
                    items.splice(i, 1);
                } else if (item.y > canvas.height + item.size) {
                    if (!item.data.isBad && !item.data.isPowerup && !item.data.isWeapon && combo > 0) {
                        combo = 0; updateHUD(); addFloatingText("Combo lost!", canvas.width/2, canvas.height - 50, "#e74c3c", 16);
                    }
                    items.splice(i, 1);
                }
            }
        }

        function gameOver() {
            state = 'GAMEOVER'; bgMusic.pause(); bgMusic.currentTime = 0; saveHighScore(score);
            uiLayer.classList.remove('hidden'); warningOverlay.classList.remove('active');
            let titleHtml = score >= globalHighScore && score > 0 ? "NEW HIGH<br>SCORE! 🎉" : "OH NO!";
            titleText.innerHTML = titleHtml;
            instructions.innerHTML = `Final Score: <span style="color:#ff758c; font-size: 1.5em; font-weight: bold;">${score}</span><br>Max Combo: ${comboVal.innerText}<br><br>Tummy ache! Let's try again! 🎀`;
            startBtn.innerText = "PLAY AGAIN";
        }

        function update() {
            if (freezeFrames > 0) { freezeFrames--; return; }

            if (keys.ArrowLeft) player.targetX -= player.speed;
            if (keys.ArrowRight) player.targetX += player.speed;

            const dx = player.targetX - player.x;
            if (Math.abs(dx) > 1) player.x += dx * 0.2; else player.x = player.targetX; 
            if (player.x < player.size / 2) { player.x = player.size / 2; player.targetX = player.x; }
            if (player.x > canvas.width - player.size / 2) { player.x = canvas.width - player.size / 2; player.targetX = player.x; }

            // Dynamic Boss Movement Logic
            if (isBossBattle) {
                if (boss.entryTimer > 0) {
                    boss.entryTimer--;
                    boss.y += 3; 
                    boss.baseY = boss.y; 
                } else {
                    if (boss.moveType === 'linear') {
                        boss.x += boss.vx;
                    } else if (boss.moveType === 'sine') {
                        boss.x += boss.vx;
                        boss.y = boss.baseY + Math.sin(frameCount * 0.05) * 50; 
                    } else if (boss.moveType === 'dart') {
                        if (frameCount % 120 < 70) {
                            boss.x += boss.vx;
                        }
                    }

                    if (boss.x < boss.size/2) { boss.x = boss.size/2; boss.vx *= -1; }
                    if (boss.x > canvas.width - boss.size/2) { boss.x = canvas.width - boss.size/2; boss.vx *= -1; }
                    
                    spawnBossItem();
                }
                if (boss.hurtFrames > 0) boss.hurtFrames--;
            }

            // Lasers (Fireballs) Logic & Boss Collision
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.y -= l.speed; // Fly straight up
                
                // Check if the fireball hit the boss
                if (isBossBattle && boss.entryTimer <= 0 && boss.hurtFrames === 0) {
                    // Check bounding box overlap
                    if (l.x > boss.x - boss.size * 0.4 && l.x < boss.x + boss.size * 0.4 &&
                        l.y < boss.y + boss.size * 0.4 && l.y > boss.y - boss.size * 0.4) {
                        
                        // Hit confirmed!
                        boss.hp--;
                        boss.hurtFrames = 15;
                        playSound('boss_hit');
                        screenShakeFrames = 10;
                        createExplosion(boss.x, boss.y, '#e74c3c');
                        lasers.splice(i, 1); // Remove laser

                        // Did the boss die?
                        if (boss.hp <= 0) {
                            isBossBattle = false;
                            bossLevel++; 
                            score += 300; 
                            
                            nextBossScore = score + 1000; 
                            
                            playSound('combo');
                            freezeFrames = 20;
                            screenShakeFrames = 30;
                            spawnConfetti();
                            addFloatingText("BOSS DEFEATED! +300", canvas.width/2, canvas.height/2, "#f39c12", 30);
                            
                            for(let j=0; j<5; j++) {
                                items.push({ x: boss.x, y: boss.y, size: 40, speed: 2, data: itemTypes.find(t=>t.type==='golden'), rotation: 0, rotSpeed: 2 });
                            }

                            items.forEach(itm => {
                                if (itm.data.type === 'pepper') {
                                    itm.data = itemTypes.find(t => t.type === 'crawfish');
                                }
                            });
                        }
                        continue; 
                    }
                }

                // Remove laser if it misses and flies off the top of the screen
                if (l.y < -50) {
                    lasers.splice(i, 1);
                }
            }

            if (player.magnetTimer > 0) {
                player.magnetTimer--;
                items.forEach(item => {
                    if (!item.data.isBad && !item.data.isPowerup) { 
                        const distX = player.x - item.x, distY = player.y - item.y;
                        if (Math.sqrt(distX * distX + distY * distY) < 300) item.x += distX * 0.04;
                    }
                });
            }

            items.forEach(item => { item.y += item.speed; item.rotation += item.rotSpeed; });
            for (let i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].y -= 2; floatingTexts[i].life--; if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1); }
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].vy += 0.3; particles[i].life--; if (particles[i].life <= 0) particles.splice(i, 1); }
            for (let i = confetti.length - 1; i >= 0; i--) { confetti[i].x += confetti[i].vx; confetti[i].y += confetti[i].vy; confetti[i].vy += 0.2; confetti[i].vx *= 0.98; confetti[i].rot += confetti[i].rotSpeed; confetti[i].life--; if (confetti[i].life <= 0) confetti.splice(i, 1); }

            if (player.hurtFrames > 0) player.hurtFrames--;
            if (screenShakeFrames > 0) screenShakeFrames--;

            spawnItem(); checkCollisions(); frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); 
            if (screenShakeFrames > 0) { const shakeAmount = 12; ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount); }

            ctx.beginPath(); ctx.moveTo(0, player.y + player.size * 0.5); ctx.lineTo(canvas.width, player.y + player.size * 0.5);
            ctx.strokeStyle = '#ffb7b2'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();

            // Draw Boss
            if (isBossBattle) {
                ctx.save();
                ctx.translate(boss.x, boss.y);
                if (boss.hurtFrames > 0) {
                    ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                    ctx.filter = 'brightness(2) sepia(1) hue-rotate(-50deg) saturate(5)'; 
                }
                ctx.font = `${boss.size}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (boss.vx > 0) { ctx.scale(-1, 1); } 
                ctx.fillText(boss.emoji, 0, 0);
                ctx.restore();

                // Draw Boss HP Bar
                ctx.fillStyle = "#333"; ctx.fillRect(boss.x - 50, boss.y - 70, 100, 10);
                ctx.fillStyle = "#e74c3c"; ctx.fillRect(boss.x - 50, boss.y - 70, (boss.hp / boss.maxHp) * 100, 10);
            }

            // Draw Lasers (Fireballs)
            lasers.forEach(l => { 
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(l.x, l.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(l.x, l.y + 12, 6, 0, Math.PI * 2);
                ctx.fill();
            });

            confetti.forEach(c => { ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.rot * Math.PI / 180); ctx.globalAlpha = c.life / 100; ctx.fillStyle = c.color; ctx.fillRect(-c.width/2, -c.height/2, c.width, c.height); ctx.restore(); });

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            items.forEach(item => {
                ctx.save(); ctx.translate(item.x, item.y); ctx.rotate(item.rotation * Math.PI / 180);
                if (item.data.type === 'golden') { ctx.shadowBlur = 20; ctx.shadowColor = "gold"; } 
                else if (item.data.type === 'poison') { ctx.shadowBlur = 15; ctx.shadowColor = "#a8e6cf"; } 
                else if (item.data.isPowerup || item.data.isWeapon) { ctx.shadowBlur = 15; ctx.shadowColor = "#fff"; }
                ctx.font = `${item.size}px Fredoka, Arial`; ctx.fillText(item.data.emoji, 0, 0); ctx.restore();
            });

            ctx.save(); ctx.translate(player.x, player.y);
            if (player.magnetTimer > 0) { ctx.beginPath(); ctx.arc(0, 0, player.size * 1.2 + Math.sin(frameCount * 0.2) * 5, 0, Math.PI * 2); ctx.strokeStyle = "rgba(155, 89, 182, 0.5)"; ctx.lineWidth = 4; ctx.stroke(); }
            if (player.hasShield) { ctx.beginPath(); ctx.arc(0, 0, player.size * 0.8, 0, Math.PI * 2); ctx.fillStyle = "rgba(52, 152, 219, 0.3)"; ctx.fill(); ctx.strokeStyle = "rgba(52, 152, 219, 0.8)"; ctx.lineWidth = 3; ctx.stroke(); }
            if (player.hurtFrames > 0) { ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8); ctx.globalAlpha = 0.7; }
            if (player.img.complete && player.img.naturalHeight !== 0) { const imgSize = player.size * 1.5; ctx.drawImage(player.img, -imgSize / 2, -imgSize / 2, imgSize, imgSize); } 
            else { ctx.font = `${player.size}px Fredoka, Arial`; ctx.fillText(player.hurtFrames > 0 ? '😵' : '👩🏻', 0, 0); }
            ctx.restore();

            particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.life / p.maxLife; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); });
            floatingTexts.forEach(ft => { ctx.save(); ctx.globalAlpha = ft.life / 40; ctx.fillStyle = ft.color; ctx.font = `bold ${ft.size}px "Fredoka", sans-serif`; ctx.textAlign = 'center'; ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.strokeText(ft.text, ft.x, ft.y); ctx.fillText(ft.text, ft.x, ft.y); ctx.restore(); });
            ctx.restore(); 
        }

        function loop() { if (state === 'PLAYING') { update(); draw(); animationId = requestAnimationFrame(loop); } }
    </script>
</body>
</html>
