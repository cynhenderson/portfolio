<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilly Ate That!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #a8edea 0%, #fed6e3 100%);
            color: #ff758c;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            touch-action: none; 
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            z-index: 10;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 {
            color: #ff758c;
            text-shadow: 3px 3px #ffb7b2;
            font-size: 48px;
            margin-bottom: 10px;
            line-height: 1.2;
            font-weight: 600;
            text-transform: uppercase;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            max-width: 80%;
            margin-bottom: 30px;
            color: #6c757d;
            font-weight: 600;
        }

        button {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            padding: 15px 40px;
            font-size: 22px;
            cursor: pointer;
            background-color: #ff758c;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px #ff4766;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px #ff4766;
        }

        .hud-text {
            font-size: 22px;
            color: #ff758c;
            font-weight: 600;
            text-shadow: 2px 2px white;
            z-index: 5;
            pointer-events: none;
            position: absolute;
        }

        #scoreBoard { top: 20px; left: 20px; }
        #comboBoard { top: 50px; left: 20px; color: #9b59b6; transition: transform 0.1s; }
        #livesBoard { top: 20px; right: 20px; }

        .combo-pop {
            transform: scale(1.5) rotate(-5deg);
        }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            p { font-size: 14px; }
            .hud-text { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="scoreBoard" class="hud-text">SCORE: <span id="scoreVal">0</span></div>
    <div id="comboBoard" class="hud-text">COMBO: <span id="comboVal">0</span></div>
    <div id="livesBoard" class="hud-text">LIVES: <span id="livesVal">❤️❤️❤️</span></div>

    <div id="uiLayer">
        <h1 id="titleText">LILLY<br>ATE THAT!</h1>
        <p id="instructions">
            Drag to move!<br><br>
            CATCH: 🦞🍤🌟<br>
            AVOID: 💣🧪<br>
            Don't let food drop to keep your COMBO!
        </p>
        <button id="startBtn">PLAY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('uiLayer');
        const startBtn = document.getElementById('startBtn');
        const titleText = document.getElementById('titleText');
        const instructions = document.getElementById('instructions');
        const scoreVal = document.getElementById('scoreVal');
        const comboVal = document.getElementById('comboVal');
        const livesVal = document.getElementById('livesVal');
        const comboBoard = document.getElementById('comboBoard');

        // --- AUDIO SYSTEM ---
        
        // Background Music Setup
        const bgMusic = new Audio('sounds/gameboy.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.2; // 20% volume so it doesn't overpower the sound effects

        // Procedural Sound Effects (Web Audio API)
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type, comboCount = 0) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'catch') {
                // Pitch goes up with combo!
                osc.type = 'sine';
                const baseFreq = 400;
                osc.frequency.setValueAtTime(baseFreq + (comboCount * 30), now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'hurt') {
                // Ugly dissonant buzzer
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'golden') {
                // Magic Chime
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'combo') {
                // Triumphant arpeggio
                osc.type = 'square';
                gainNode.gain.setValueAtTime(0.1, now);
                osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(554.37, now + 0.1); // C#5
                osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
                osc.frequency.setValueAtTime(880, now + 0.3); // A5
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        // Load Player Image
        const playerImg = new Image();
        playerImg.src = 'photos/lilly.png';

        // Game State
        let state = 'START';
        let score = 0;
        let lives = 3;
        let combo = 0;
        let frameCount = 0;
        let animationId;
        let screenShakeFrames = 0;
        let freezeFrames = 0; // Dramatic pause for combos

        // Player Object
        const player = {
            x: 0,
            y: 0,
            size: 85,
            speed: 8,
            targetX: 0,
            img: playerImg,
            hurtFrames: 0 
        };

        // Entities Arrays
        let items = [];
        let floatingTexts = [];
        let particles = [];
        let confetti = [];

        // Item Configurations
        const itemTypes = [
            { type: 'crawfish', emoji: '🦞', points: 10, prob: 0.4, isBad: false },
            { type: 'shrimp', emoji: '🍤', points: 5, prob: 0.35, isBad: false },
            { type: 'golden', emoji: '🌟', points: 50, prob: 0.05, isBad: false },
            { type: 'bomb', emoji: '💣', points: 0, prob: 0.1, isBad: true },
            { type: 'poison', emoji: '🧪', points: 0, prob: 0.1, isBad: true }
        ];

        // Input
        const keys = { ArrowLeft: false, ArrowRight: false };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (state === 'START') {
                player.x = canvas.width / 2;
                player.targetX = player.x;
            }
            player.y = canvas.height - player.size - 20;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        function handlePointer(e) {
            if (state !== 'PLAYING') return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            player.targetX = clientX;
        }
        canvas.addEventListener('mousedown', handlePointer);
        canvas.addEventListener('mousemove', (e) => { if(e.buttons > 0) handlePointer(e); });
        canvas.addEventListener('touchstart', handlePointer);
        canvas.addEventListener('touchmove', handlePointer);

        startBtn.addEventListener('click', () => {
            initAudio(); // Must start audio context on user gesture
            
            // Start background music
            bgMusic.play().catch(e => console.log("Audio play failed, user interaction required:", e));
            
            resetGame();
            state = 'PLAYING';
            uiLayer.classList.add('hidden');
            loop();
        });

        function resetGame() {
            score = 0;
            lives = 3;
            combo = 0;
            items = [];
            floatingTexts = [];
            particles = [];
            confetti = [];
            frameCount = 0;
            screenShakeFrames = 0;
            freezeFrames = 0;
            player.x = canvas.width / 2;
            player.targetX = player.x;
            updateHUD();
        }

        function updateHUD() {
            scoreVal.innerText = score;
            let hearts = '';
            for(let i=0; i<lives; i++) hearts += '❤️';
            livesVal.innerText = hearts || '💀';
            comboVal.innerText = combo;
            
            // Pop the combo text
            if (combo > 0) {
                comboBoard.classList.add('combo-pop');
                setTimeout(() => comboBoard.classList.remove('combo-pop'), 100);
            }
        }

        function spawnItem() {
            const spawnRate = Math.max(25, 100 - Math.floor(score / 8)); 
            
            if (frameCount % spawnRate === 0) {
                let rand = Math.random();
                let cumulativeProb = 0;
                let selectedType = itemTypes[0];

                for (let type of itemTypes) {
                    cumulativeProb += type.prob;
                    if (rand <= cumulativeProb) {
                        selectedType = type;
                        break;
                    }
                }

                const size = 40;
                const baseSpeed = 1.0 + Math.random() * 1.5; 
                const speedMultiplier = 1 + (score / 200); 

                items.push({
                    x: Math.random() * (canvas.width - size * 2) + size,
                    y: -size,
                    size: size,
                    speed: baseSpeed * speedMultiplier,
                    data: selectedType,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 5
                });
            }
        }

        function addFloatingText(text, x, y, color, size = 20) {
            floatingTexts.push({
                text: text, x: x, y: y, color: color, life: 40, size: size
            });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 30, maxLife: 30, color: color,
                    size: Math.random() * 8 + 4
                });
            }
        }

        function spawnConfetti() {
            const colors = ['#ff758c', '#ffb7b2', '#a8edea', '#fed6e3', '#f39c12', '#2ecc71', '#9b59b6'];
            for (let i = 0; i < 80; i++) {
                confetti.push({
                    x: canvas.width / 2,
                    y: player.y,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() * -15) - 5,
                    width: Math.random() * 10 + 5,
                    height: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 10,
                    life: 100
                });
            }
        }

        function checkCollisions() {
            const pBox = {
                left: player.x - player.size * 0.4, right: player.x + player.size * 0.4,
                top: player.y - player.size * 0.4, bottom: player.y + player.size * 0.4
            };

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const iBox = {
                    left: item.x - item.size * 0.4, right: item.x + item.size * 0.4,
                    top: item.y - item.size * 0.4, bottom: item.y + item.size * 0.4
                };

                // Caught an item!
                if (pBox.left < iBox.right && pBox.right > iBox.left && pBox.top < iBox.bottom && pBox.bottom > iBox.top) {
                    
                    if (item.data.isBad) {
                        // BAD ITEM CAUGHT
                        lives--;
                        combo = 0; // Reset combo!
                        player.hurtFrames = 15;
                        screenShakeFrames = 15;
                        playSound('hurt');
                        addFloatingText("OUCH!", player.x, player.y - 40, "#e74c3c");
                        
                        let expColor = item.data.type === 'bomb' ? '#333333' : '#a8e6cf';
                        createExplosion(player.x, player.y, expColor);
                        
                        updateHUD();
                        if (lives <= 0) gameOver();
                    } else {
                        // GOOD ITEM CAUGHT
                        combo++;
                        
                        // Calculate score multiplier based on combo (up to 3x)
                        let multiplier = 1;
                        if (combo >= 10) multiplier = 2;
                        if (combo >= 20) multiplier = 3;
                        
                        let earnedPoints = item.data.points * multiplier;
                        score += earnedPoints;

                        // Play specific sounds
                        if (item.data.type === 'golden') playSound('golden');
                        else playSound('catch', Math.min(combo, 20)); // Cap pitch shift

                        addFloatingText("+" + earnedPoints, player.x, player.y - 40, "#2ecc71");

                        // Check for Combo Milestone (Every 10)
                        if (combo > 0 && combo % 10 === 0) {
                            freezeFrames = 10; // Dramatic pause!
                            playSound('combo');
                            spawnConfetti();
                            addFloatingText("COMBO x" + combo + "!", canvas.width/2, canvas.height/2, "#9b59b6", 40);
                            screenShakeFrames = 10;
                        }
                        
                        updateHUD();
                    }
                    
                    items.splice(i, 1);
                } else if (item.y > canvas.height + item.size) {
                    // Item hit the floor
                    if (!item.data.isBad && combo > 0) {
                        combo = 0; // Missing good food breaks the combo!
                        updateHUD();
                        addFloatingText("Combo lost!", canvas.width/2, canvas.height - 50, "#e74c3c", 16);
                    }
                    items.splice(i, 1);
                }
            }
        }

        function gameOver() {
            state = 'GAMEOVER';
            
            // Stop the music to add to the dramatic defeat
            bgMusic.pause();
            bgMusic.currentTime = 0;
            
            uiLayer.classList.remove('hidden');
            titleText.innerHTML = "OH NO!";
            instructions.innerHTML = `Final Score: <span style="color:#ff758c; font-size: 1.5em; font-weight: bold;">${score}</span><br>Max Combo: ${comboVal.innerText}<br><br>Tummy ache! Let's try again! 🎀`;
            startBtn.innerText = "PLAY AGAIN";
        }

        function update() {
            // Freeze logic for dramatic combo impacts
            if (freezeFrames > 0) {
                freezeFrames--;
                return; 
            }

            if (keys.ArrowLeft) player.targetX -= player.speed;
            if (keys.ArrowRight) player.targetX += player.speed;

            const dx = player.targetX - player.x;
            if (Math.abs(dx) > 1) player.x += dx * 0.2;
            else player.x = player.targetX; 

            if (player.x < player.size / 2) { player.x = player.size / 2; player.targetX = player.x; }
            if (player.x > canvas.width - player.size / 2) { player.x = canvas.width - player.size / 2; player.targetX = player.x; }

            items.forEach(item => { item.y += item.speed; item.rotation += item.rotSpeed; });

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 2; floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update Confetti
            for (let i = confetti.length - 1; i >= 0; i--) {
                let c = confetti[i];
                c.x += c.vx;
                c.y += c.vy;
                c.vy += 0.2; // Gravity
                c.vx *= 0.98; // Air resistance
                c.rot += c.rotSpeed;
                c.life--;
                if (c.life <= 0) confetti.splice(i, 1);
            }

            if (player.hurtFrames > 0) player.hurtFrames--;
            if (screenShakeFrames > 0) screenShakeFrames--;

            spawnItem();
            checkCollisions();
            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); 

            if (screenShakeFrames > 0) {
                const shakeAmount = 12; 
                ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
            }

            ctx.beginPath();
            ctx.moveTo(0, player.y + player.size * 0.5);
            ctx.lineTo(canvas.width, player.y + player.size * 0.5);
            ctx.strokeStyle = '#ffb7b2';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Draw Confetti (Behind Player)
            confetti.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rot * Math.PI / 180);
                ctx.globalAlpha = c.life / 100;
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.width/2, -c.height/2, c.width, c.height);
                ctx.restore();
            });

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            items.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(item.rotation * Math.PI / 180);
                
                if (item.data.type === 'golden') { ctx.shadowBlur = 20; ctx.shadowColor = "gold"; } 
                else if (item.data.type === 'poison') { ctx.shadowBlur = 15; ctx.shadowColor = "#a8e6cf"; } 
                else { ctx.shadowBlur = 0; }
                
                ctx.font = `${item.size}px Fredoka, Arial`;
                ctx.fillText(item.data.emoji, 0, 0);
                ctx.restore();
            });

            ctx.save();
            ctx.translate(player.x, player.y);
            
            if (player.hurtFrames > 0) {
                ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
                ctx.globalAlpha = 0.7; 
            }

            if (player.img.complete && player.img.naturalHeight !== 0) {
                const imgSize = player.size * 1.5; 
                ctx.drawImage(player.img, -imgSize / 2, -imgSize / 2, imgSize, imgSize);
            } else {
                ctx.font = `${player.size}px Fredoka, Arial`;
                ctx.fillText(player.hurtFrames > 0 ? '😵' : '👩🏻', 0, 0);
            }
            ctx.restore();

            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life / p.maxLife; 
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            floatingTexts.forEach(ft => {
                ctx.save();
                ctx.globalAlpha = ft.life / 40; 
                ctx.fillStyle = ft.color;
                // Add white outline to combo text for readability
                ctx.font = `bold ${ft.size}px "Fredoka", sans-serif`;
                ctx.textAlign = 'center';
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.strokeText(ft.text, ft.x, ft.y);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            });

            ctx.restore(); 
        }

        function loop() {
            if (state === 'PLAYING') {
                update();
                draw();
                animationId = requestAnimationFrame(loop);
            }
        }
    </script>
</body>
</html>
