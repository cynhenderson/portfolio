<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoopy's Great Novel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the pixel-art/comic feel */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            font-family: 'VT323', monospace;
            background-color: #1a202c; /* Dark blue/gray for night */
            overflow: hidden; /* Prevent scrolling on mobile */
            touch-action: pan-x pan-y;
        }

        /* Keep pixel art crisp */
        .pixelated {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* Twinkling stars animation */
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .star { animation: twinkle 2s infinite; }
        .star:nth-child(even) { animation-delay: 1s; }
        .star:nth-child(3n) { animation-delay: 0.5s; }
        
        /* Success flash animation */
        @keyframes flashGreen {
            0% { background-color: #4ade80; color: white; transform: scale(1.1); }
            100% { background-color: white; color: black; transform: scale(1); }
        }
        .flash-success {
            animation: flashGreen 0.3s ease-out;
        }
    </style>
</head>
<body class="text-white h-screen w-screen flex flex-col items-center justify-between">

    <!-- Starry Background Elements -->
    <div class="absolute top-10 left-10 text-xl star text-yellow-200">✨</div>
    <div class="absolute top-32 right-20 text-sm star text-yellow-200">✨</div>
    <div class="absolute top-24 left-1/3 text-2xl star text-yellow-200">✨</div>
    <div class="absolute top-8 right-10 text-6xl text-yellow-100">🌔</div>

    <!-- Header / Score -->
    <header class="w-full text-center pt-8 z-10 flex flex-col items-center">
        <h1 class="text-3xl md:text-4xl text-yellow-400 tracking-widest drop-shadow-md">Snoopy's Novel</h1>
        <p class="text-xl mt-2 text-gray-300">Words Typed: <span id="score" class="text-white text-2xl">0</span></p>
    </header>

    <!-- Main Game Area -->
    <main class="flex-grow flex flex-col items-center justify-end w-full max-w-md pb-4 z-10 relative">
        
        <!-- Thought Bubble containing the word -->
        <div id="word-bubble" class="bg-white text-black px-6 py-3 rounded-2xl mb-32 text-3xl shadow-lg border-4 border-black relative transition-colors duration-200">
            <span id="target-word" class="tracking-wider">stormy</span>
            <!-- Bubble tail points to Snoopy -->
            <div class="absolute -bottom-3 left-1/4 transform -translate-x-1/2 w-4 h-4 bg-white border-b-4 border-r-4 border-black rotate-45"></div>
            <!-- Extra thought bubble dots spread further down -->
            <div class="absolute -bottom-12 left-1/4 transform -translate-x-2 w-3 h-3 bg-white border-2 border-black rounded-full"></div>
            <div class="absolute -bottom-24 left-1/4 transform -translate-x-6 w-2 h-2 bg-white border-2 border-black rounded-full"></div>
        </div>

        <!-- Snoopy & Doghouse -->
        <div class="relative flex flex-col items-center mt-8">
            <!-- Characters sitting on roof -->
            <div class="absolute bottom-full w-full flex justify-center items-end z-10 mb-[-12px]">
                <!-- Snoopy is slightly smaller (w-32 h-32) -->
                <img src="photos/snoopy.png" alt="Snoopy" class="pixelated w-32 h-32 object-contain drop-shadow-xl -mr-2" onerror="this.onerror=null; this.src='https://placehold.co/100x100?text=Snoopy';">
                
                <!-- Typewriter -->
                <div class="text-4xl z-20 mb-[10px] ml-1">⌨️</div>
            </div>
            
            <!-- Doghouse SVG (Isosceles Trapezoid Roof) -->
            <svg width="200" height="150" viewBox="0 0 200 150" class="drop-shadow-lg z-0 relative">
                <!-- Body -->
                <rect x="30" y="55" width="140" height="90" fill="#e53e3e" stroke="black" stroke-width="4"/>
                <!-- Planks -->
                <line x1="30" y1="85" x2="170" y2="85" stroke="black" stroke-width="4"/>
                <line x1="30" y1="115" x2="170" y2="115" stroke="black" stroke-width="4"/>

                <!-- Roof Trapezoid -->
                <polygon points="45,5 155,5 195,55 5,55" fill="#e53e3e" stroke="black" stroke-width="4" stroke-linejoin="round"/>
            </svg>
        </div>

    </main>

    <!-- Footer / Input Area -->
    <footer class="w-full p-4 bg-gray-900 border-t-4 border-black z-20 pb-8">
        <div class="max-w-md mx-auto text-center">
            <p class="text-gray-400 text-sm mb-2">Tap below to help him write!</p>
            <!-- 
              Input is specifically configured for mobile games:
              no autocorrect, no spellcheck, no autocapitalize, so the user has to type it perfectly.
            -->
            <input 
                type="text" 
                id="type-input" 
                class="w-full text-center p-3 rounded-lg text-black text-3xl border-4 border-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-600 shadow-xl transition-all font-sans font-bold" 
                placeholder="Type here..." 
                autocomplete="off" 
                autocorrect="off" 
                autocapitalize="off" 
                spellcheck="false"
            >
        </div>
    </footer>

    <script>
        // Peanuts & Writing themed dictionary
        const words = [
            'snoopy', 'woodstock', 'peanuts', 'beagle', 'doghouse', 
            'dark', 'stormy', 'night', 'novel', 'typewriter', 
            'supper', 'charlie', 'brown', 'linus', 'lucy', 
            'blanket', 'flying', 'ace', 'baron', 'writer', 
            'fiction', 'genius', 'paper', 'keys', 'schulz',
            'comic', 'strip', 'laugh', 'good', 'grief', 'lilly',
            'manny', 'mom', 'tia', 'dad', 'tio', 'abuela', 'abuelo',
            'friends', 'dance', 'cheer', 'volleyball'
        ];

        let currentWord = '';
        let score = 0;

        // DOM Elements
        const targetWordEl = document.getElementById('target-word');
        const inputEl = document.getElementById('type-input');
        const scoreEl = document.getElementById('score');
        const bubbleEl = document.getElementById('word-bubble');

        function initGame() {
            score = 0;
            scoreEl.innerText = score;
            nextWord();
            
            // Listen to input changes (works perfectly for mobile keyboards)
            inputEl.addEventListener('input', checkInput);
            
            // Focus input on load (works on desktop, mobile users will tap it)
            inputEl.focus();
        }

        function nextWord() {
            // Pick a random word that isn't the same as the current one
            let newWord = currentWord;
            while (newWord === currentWord) {
                newWord = words[Math.floor(Math.random() * words.length)];
            }
            currentWord = newWord;
            targetWordEl.innerText = currentWord;
            inputEl.value = ''; // Clear input for the next word
        }

        function checkInput() {
            // Get what the user typed, make it lowercase, and remove rogue spaces
            const typed = inputEl.value.toLowerCase().trim();
            
            if (typed === currentWord) {
                // Correct word typed!
                score += 1;
                scoreEl.innerText = score;
                successAnimation();
                nextWord();
            }
        }

        function successAnimation() {
            // Remove the class if it's currently animating so we can restart it
            bubbleEl.classList.remove('flash-success');
            
            // Trigger reflow to restart animation
            void bubbleEl.offsetWidth; 
            
            // Add the animation class back
            bubbleEl.classList.add('flash-success');
        }

        // Keep focus on input if they tap anywhere on the game screen 
        // (helpful for desktop so they don't accidentally click away)
        document.querySelector('main').addEventListener('click', () => {
            inputEl.focus();
        });

        // Start the game when the window loads
        window.onload = initGame;
    </script>
</body>
</html>
