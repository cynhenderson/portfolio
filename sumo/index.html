<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Oscar's Fever Dream</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      max-width: 430px;
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      image-rendering: pixelated;
    }

    /* =====================
       PANELS
    ===================== */
    .panel {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .panel.active {
      opacity: 1;
      pointer-events: auto;
    }
    .panel.cut { transition: none; }

    /* -- Start Screen -- */
    #start-screen {
      background: #0a1128;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      z-index: 90;
      text-align: center;
    }
    #start-screen h1 {
      color: #ff6a00;
      font-size: clamp(1.5rem, 7vw, 2.5rem);
      line-height: 1.5;
      text-shadow: 4px 4px 0 #000;
      letter-spacing: 0.05em;
    }
    #start-screen .insert-coin {
      color: #00e5ff;
      font-size: clamp(0.6rem, 3vw, 1rem);
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
      animation: blink 1.2s step-end infinite;
      cursor: pointer;
    }

    /* -- Panel 1: Alley -- */
    #p1-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center 55%;
      animation: kenburns 8s ease-in-out forwards;
    }

    #p1-lamp {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: radial-gradient(ellipse at 85% 0%, rgba(255,180,80,0.45) 0%, transparent 70%);
      animation: flicker 2.5s infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    #p1-fade {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    @keyframes kenburns {
      from { transform: scale(1.05) translateY(0px); }
      to   { transform: scale(1.3) translateY(-22px); }
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.1; }
      40% { opacity: 0.6; } 
    }

    /* -- Panel 2: Grind -- */
    #panel2 { background: #000; }
    #p2-sprite {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    #p2-saturday {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: clamp(1.4rem, 6.5vw, 2.5rem);
      color: rgba(220, 225, 235, 0.7);
      text-shadow: none;
      letter-spacing: 0.15em;
      padding-left: 0.15em; 
      pointer-events: none;
      text-align: center;
    }
    #p2-fightnight {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: clamp(2.5rem, 12vw, 4rem);
      color: #ff6a00;
      text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 0 0 40px rgba(255,106,0,0.8);
      text-align: center;
      line-height: 1.1;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* -- Panel 3: 3AM -- */
    #panel3 { background: #000; }
    #p3-bg, #p3-shift {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }

    /* -- Panel 4: Eyes -- */
    #panel4 { background: #000; }
    #p4-closed, #p4-open {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }
    #p4-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.35) 2px, rgba(0,0,0,0.35) 4px
      );
      opacity: 0;
      pointer-events: none;
    }

    /* =====================
       GAME WRAPPER
    ===================== */
    #game-wrapper {
      position: absolute;
      inset: 0;
      display: none;
      transform-origin: 50.2% 51%;
    }
    #game-wrapper.active { display: block; }

    #screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 5;
    }
    #screen-bg {
      position: absolute;
      inset: 0;
      background: #0a1128;
    }

    #hud {
      position: absolute;
      top: 3%;
      left: 3%;
      width: 94%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
    }
    #lives { display: flex; gap: 3px; align-items: center; }
    .heart { width: 22px; height: 22px; object-fit: contain; image-rendering: pixelated; }
    #score { color: #00e5ff; font-size: clamp(0.5rem, 2vw, 0.7rem); text-shadow: 0 0 8px #00e5ff; }

    #timer-wrap {
      position: absolute;
      bottom: 3%;
      left: 3%;
      width: 94%;
      height: 8px;
      background: rgba(0,229,255,0.12);
      border: 1px solid rgba(0,229,255,0.35);
      z-index: 5;
    }
    #timer-bar {
      height: 100%;
      width: 100%;
      background: #ff6a00;
      box-shadow: 0 0 6px #ff6a00;
      transition: width linear;
    }

    #game-content {
      position: absolute;
      top: 13%;
      left: 0;
      width: 100%;
      bottom: 13%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 5;
      overflow: hidden;
    }
    #chanko-container {
      position: absolute;
      inset: 0;
      display: none;
    }
    #oscar-img {
      position: absolute;
      height: 88%;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 1;
    }
    
    #bowl-container {
      position: absolute;
      width: 55%;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #chanko-img {
      width: 100%;
      object-fit: contain;
      display: block;
    }

    #cabinet-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 10;
    }

    /* =====================
       UI OVERLAYS
    ===================== */
    #stamp {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: clamp(2rem, 8vw, 3rem);
      color: #ff6a00;
      text-align: center;
      text-shadow: 3px 3px 0 #000;
      z-index: 25;
      pointer-events: none;
      white-space: pre-wrap;
      line-height: 1.3;
    }
    #flash {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.05s;
    }

    #loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading span {
      color: #00e5ff;
      font-size: clamp(0.45rem, 2.2vw, 0.8rem);
      text-shadow: 0 0 10px #00e5ff;
      letter-spacing: 0.2em;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .end-screen {
      position: absolute;
      inset: 0;
      background: #0a1128;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 50;
      text-align: center;
      padding: 2.5rem;
    }
    .end-screen.active { display: flex; }
    .end-screen h1 {
      font-size: clamp(1.2rem, 5.5vw, 1.8rem);
      line-height: 1.8;
    }
    .end-screen .sub {
      font-size: clamp(0.4rem, 1.8vw, 0.6rem);
      letter-spacing: 0.1em;
    }
    .end-screen .hint {
      font-size: clamp(0.35rem, 1.5vw, 0.5rem);
      color: #fff;
      animation: blink 1s step-end infinite;
      margin-top: 0.5rem;
    }
    #demo-complete h1 { color: #00e5ff; text-shadow: 0 0 15px #00e5ff; }
    #demo-complete .sub { color: #ff6a00; }
    #gameover-screen h1 { color: #00e5ff; text-shadow: 0 0 15px #00e5ff; }
    #gameover-screen .sub { color: #ff6a00; }

    /* =====================
       SHIKO STOMP (Balance Meter)
    ===================== */
    #shiko-container {
      position: absolute;
      inset: 0;
      display: none;
    }
    #shiko-oscar {
      position: absolute;
      height: 75%;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 1;
    }
    #balance-meter {
      position: absolute;
      bottom: 5%;
      left: 8%;
      width: 84%;
      height: 28px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    #meter-track {
      position: relative;
      width: 100%;
      height: 14px;
      border: 2px solid rgba(0,229,255,0.5);
      background: transparent;
      overflow: hidden;
    }
    #meter-zone-left {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 30%;
      background: rgba(255, 0, 0, 0.35);
    }
    #meter-zone-right {
      position: absolute;
      top: 0; bottom: 0; right: 0;
      width: 30%;
      background: rgba(255, 0, 0, 0.35);
    }
    #meter-zone-center {
      position: absolute;
      top: 0; bottom: 0;
      left: 30%; right: 30%;
      background: rgba(0, 255, 100, 0.25);
      box-shadow: inset 0 0 8px rgba(0,255,100,0.3);
    }
    #meter-needle {
      position: absolute;
      top: -2px; bottom: -2px;
      width: 4px;
      background: #fff;
      box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,0.5);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }
    #stable-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(0,229,255,0.12);
      border: 1px solid rgba(0,229,255,0.25);
    }
    #stable-bar {
      height: 100%;
      width: 0%;
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
      transition: none;
    }

    /* =====================
       THROW GAME
    ===================== */
    #throw-container {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
    }
    #throw-oscar {
      position: absolute;
      height: 80%;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 2;
    }
    #throw-zone {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 10%;
      top: 65%;    
      border-top: 3px solid rgba(0, 229, 255, 0.7);
      border-bottom: 3px solid rgba(0, 229, 255, 0.7);
      background: rgba(0, 229, 255, 0.08);
      z-index: 1;
      pointer-events: none;
    }
    #throw-zone-glow {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 10%; 
      top: 65%;    
      background: rgba(0, 229, 255, 0.15);
      z-index: 1;
      pointer-events: none;
      animation: zone-pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes zone-pulse {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }
    #throw-opponent {
      position: absolute;
      width: 70%;
      left: 50%;
      transform: translateX(-50%);
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 3;
      top: -60%;
      filter: hue-rotate(140deg) saturate(1.5) brightness(0.85);
    }
    #throw-feedback {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: clamp(1rem, 4vw, 1.5rem);
      color: #ff6a00;
      text-shadow: 2px 2px 0 #000;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
    }
    @keyframes opponent-flung {
      0%   { transform: translateX(-50%) rotate(0deg); opacity: 1; }
      30%  { transform: translateX(60%) rotate(40deg) scale(0.9); opacity: 1; }
      100% { transform: translateX(180%) rotate(120deg) scale(0.4); opacity: 0; }
    }
    .opponent-flung {
      animation: opponent-flung 0.6s ease-in forwards !important;
    }

    /* =====================
       TSUPPARI DODGE (Swipe to Safety)
    ===================== */
    #dodge-container {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
    }
    
    #dodge-oscar {
      position: absolute;
      height: 70%;
      bottom: 0;
      left: 50%;
      transform-origin: bottom center; 
      transform: translateX(-50%);
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 2;
      transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    #dodge-oscar.dodge-left { transform: translateX(-120%) rotate(-8deg); }
    #dodge-oscar.dodge-right { transform: translateX(20%) rotate(8deg); }

    /* -- Safe Zone Telegraph Glow -- */
    #dodge-telegraph {
      position: absolute;
      bottom: 0;
      width: 50%;
      height: 35%;
      background: radial-gradient(ellipse at center bottom, rgba(0, 255, 100, 0.5) 0%, transparent 70%);
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-in;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(2rem, 8vw, 3rem);
      color: rgba(0, 255, 100, 0.9);
      text-shadow: 0 0 15px rgba(0, 255, 100, 1);
    }
    #dodge-telegraph.tele-left { left: 0; }
    #dodge-telegraph.tele-left::after { content: '««'; animation: pulse-arrow-left 0.5s infinite alternate; }
    #dodge-telegraph.tele-right { right: 0; left: auto; }
    #dodge-telegraph.tele-right::after { content: '»»'; animation: pulse-arrow-right 0.5s infinite alternate; }

    @keyframes pulse-arrow-left {
      from { transform: translateX(10px); opacity: 0.4; }
      to { transform: translateX(-5px); opacity: 1; }
    }
    @keyframes pulse-arrow-right {
      from { transform: translateX(-10px); opacity: 0.4; }
      to { transform: translateX(5px); opacity: 1; }
    }

    .ghost-hand {
      position: absolute;
      width: 32%;
      top: -50%;
      opacity: 0;
      object-fit: contain;
      image-rendering: pixelated;
      z-index: 3;
    }
    .ghost-hand.hand-left { left: 8%; }
    .ghost-hand.hand-right { right: 8%; }

    .ghost-hand.winding-up {
      top: -30%;
      opacity: 1;
    }
    .ghost-hand.slamming {
      top: 25%;
      opacity: 1;
      transition-timing-function: ease-in;
    }
    .ghost-hand.withdrawing {
      top: -50%;
      opacity: 0;
      transition: top 0.3s ease-out, opacity 0.2s ease-out;
    }

    #dodge-wave-counter {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0,229,255,0.6);
      font-size: clamp(0.4rem, 1.8vw, 0.55rem);
      z-index: 4;
      pointer-events: none;
      letter-spacing: 0.1em;
    }

    /* SHAKE */
    @keyframes shake-sm {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-4px); }
      40%,80% { transform: translateX(4px); }
    }
    @keyframes shake-lg {
      0%,100% { transform: translateX(0); }
      15%,45%,75% { transform: translateX(-8px); }
      30%,60%,90% { transform: translateX(8px); }
    }
    .shake-sm { animation: shake-sm 0.15s ease-in-out; }
    .shake-lg { animation: shake-lg 0.22s ease-in-out; }
    @keyframes shake-xl {
      0%,100% { transform: translate(0,0); }
      10%,50%,90% { transform: translate(-14px,-3px); }
      20%,60% { transform: translate(14px,3px); }
      30%,70% { transform: translate(-10px,2px); }
      40%,80% { transform: translate(10px,-2px); }
    }
    .shake-xl { animation: shake-xl 0.35s ease-in-out; }
  </style>
</head>
<body>
<div id="app">

  <audio id="bgm-track" src="intro-music.m4a" preload="auto"></audio>

  <div id="loading"><span>DREAMING...</span></div>
  
  <div id="start-screen" class="panel">
    <h1>OSCAR'S<br>FEVER DREAM</h1>
    <div class="insert-coin">TAP TO START</div>
  </div>

  <div id="panel1" class="panel">
    <img id="p1-bg" src="01-poster-bg.png" alt="">
    <div id="p1-lamp"></div>
    <div id="p1-fade"></div>
  </div>

  <div id="panel2" class="panel cut">
    <img id="p2-sprite" src="oscar-sumo.png" alt="">
    <div id="p2-saturday">SATURDAY</div>
    <div id="p2-fightnight">FIGHT<br>NIGHT</div>
  </div>

  <div id="panel3" class="panel cut">
    <img id="p3-bg" src="night.png" alt="">
    <img id="p3-shift" src="night-shift.png" alt="">
  </div>

  <div id="panel4" class="panel cut">
    <img id="p4-closed" src="night-close-up.png" alt="">
    <img id="p4-open" src="night-eyes-open.png" alt="">
    <div id="p4-scanlines"></div>
  </div>

  <div id="game-wrapper">
    <div id="screen">
      <div id="screen-bg"></div>
      <div id="hud">
        <div id="lives">
          <img class="heart" src="heart-full.png" alt="">
          <img class="heart" src="heart-full.png" alt="">
          <img class="heart" src="heart-full.png" alt="">
          <img class="heart" src="heart-full.png" alt="">
        </div>
        <div id="score">000</div>
      </div>
      <div id="game-content">
        <div id="chanko-container">
          <div id="bowl-container">
            <img id="chanko-img" src="chanko.png" alt="">
          </div>
          <img id="oscar-img" src="mouth-open.png" alt="">
        </div>
        <div id="shiko-container">
          <img id="shiko-oscar" src="oscar-shiko.png" alt="">
          <div id="balance-meter">
            <div id="meter-track">
              <div id="meter-zone-left"></div>
              <div id="meter-zone-center"></div>
              <div id="meter-zone-right"></div>
              <div id="meter-needle"></div>
            </div>
            <div id="stable-bar-track">
              <div id="stable-bar"></div>
            </div>
          </div>
        </div>
        <div id="throw-container">
          <img id="throw-oscar" src="oscar-neutral.png" alt="">
          <div id="throw-zone"></div>
          <div id="throw-zone-glow"></div>
          <img id="throw-opponent" src="opponent.png" alt="">
          <div id="throw-feedback"></div>
        </div>
        <div id="dodge-container">
          <img id="dodge-oscar" src="oscar-neutral.png" alt="">
          <div id="dodge-telegraph"></div>
          <img class="ghost-hand hand-left" id="dodge-hand-left" src="ghost-hand-left.png" alt="">
          <img class="ghost-hand hand-right" id="dodge-hand-right" src="ghost-hand-right.png" alt="">
          <div id="dodge-wave-counter"></div>
        </div>
      </div>
      <div id="timer-wrap">
        <div id="timer-bar"></div>
      </div>
    </div>
    <img id="cabinet-img" src="arcade-cabinet.png" alt="">
  </div>

  <div id="stamp"></div>
  <div id="flash"></div>

  <div id="demo-complete" class="end-screen">
    <h1>DEMO<br>COMPLETE</h1>
    <div class="sub">SCORE: <span id="final-score">000</span></div>
    <div class="hint">TAP TO RESTART</div>
  </div>

  <div id="gameover-screen" class="end-screen">
    <h1>WAKE<br>UP</h1>
    <div class="sub">SCORE: <span id="go-score">000</span></div>
    <div class="hint">TAP TO RESTART</div>
  </div>

</div>
<script>
// ===================================================
//  AUDIO ENGINE
// ===================================================
const AudioEngine = {
  ctx: null,
  init: function() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AudioContext();
  },
  resume: function() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  
  playGlitchSting: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(100, t);
    for(let i=1; i<5; i++) {
       osc.frequency.setValueAtTime(Math.random() * 2000 + 200, t + (i*0.03));
    }
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
  },

  playSlam: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'square';
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.exponentialRampToValueAtTime(10, t + 0.4);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.4);
  },

  playCoin: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, t); 
    osc.frequency.setValueAtTime(1760, t + 0.08); 
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.2);
  },

  playChomp: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.05); 
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05); 
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.05);
  },

  playWin: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'square';
    osc.frequency.setValueAtTime(523.25, t); 
    osc.frequency.setValueAtTime(659.25, t + 0.1);
    osc.frequency.setValueAtTime(783.99, t + 0.2); 
    osc.frequency.setValueAtTime(1046.50, t + 0.3); 
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.setValueAtTime(0.1, t + 0.4);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.6);
  },

  playLose: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.5); 
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.5);
  },

  playWobble: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.setValueAtTime(180, t + 0.04);
    osc.frequency.setValueAtTime(240, t + 0.08);
    osc.frequency.setValueAtTime(160, t + 0.12);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
  },

  playThrow: function() {
    if (!this.ctx) return;
    const noise = this.ctx.createOscillator();
    const nGain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    noise.type = 'sawtooth';
    noise.frequency.setValueAtTime(200, t);
    noise.frequency.exponentialRampToValueAtTime(800, t + 0.1);
    noise.frequency.exponentialRampToValueAtTime(100, t + 0.3);
    nGain.gain.setValueAtTime(0.2, t);
    nGain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    noise.connect(nGain); nGain.connect(this.ctx.destination);
    noise.start(t); noise.stop(t + 0.3);
    const thud = this.ctx.createOscillator();
    const tGain = this.ctx.createGain();
    thud.type = 'sine';
    thud.frequency.setValueAtTime(80, t + 0.12);
    thud.frequency.exponentialRampToValueAtTime(30, t + 0.4);
    tGain.gain.setValueAtTime(0, t);
    tGain.gain.setValueAtTime(0.4, t + 0.12);
    tGain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
    thud.connect(tGain); tGain.connect(this.ctx.destination);
    thud.start(t); thud.stop(t + 0.4);
  },

  playWhiff: function() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const t = this.ctx.currentTime;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
  },

  playWhoosh: function() {
    if (!this.ctx) return;
    const bufferSize = this.ctx.sampleRate * 0.25;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    const t = this.ctx.currentTime;
    filter.frequency.setValueAtTime(2000, t);
    filter.frequency.exponentialRampToValueAtTime(400, t + 0.2);
    filter.Q.value = 1.5;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
    noise.start(t); noise.stop(t + 0.25);
  },

  playBonk: function() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.2);
    
    const osc2 = this.ctx.createOscillator();
    const gain2 = this.ctx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(300, t + 0.05);
    osc2.frequency.setValueAtTime(500, t + 0.1);
    osc2.frequency.setValueAtTime(250, t + 0.15);
    gain2.gain.setValueAtTime(0.08, t + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    osc2.connect(gain2); gain2.connect(this.ctx.destination);
    osc2.start(t + 0.05); osc2.stop(t + 0.25);
  }
};

function showPanel(el) {

function doFlash(color, ms) {
  flashEl.style.background = color;
  flashEl.style.opacity = '1';
  schedule(() => { flashEl.style.opacity = '0'; }, ms);
}
function shake(level) {
  const cls = level === 'xl' ? 'shake-xl' : level ? 'shake-lg' : 'shake-sm';
  app.classList.remove('shake-sm', 'shake-lg', 'shake-xl');
  void app.offsetWidth;
  app.classList.add(cls);
  app.addEventListener('animationend', () => app.classList.remove(cls), { once: true });
}
function stampShow(text, color, sizeCss, bg) {
  stamp.textContent     = text;
  stamp.style.color     = color;
  stamp.style.fontSize  = sizeCss;
  stamp.style.background = bg || 'transparent';
  stamp.style.opacity   = '0';
  stamp.style.transform = 'scale(2.2)';
  stamp.style.transition = 'none';
  stamp.style.display   = 'flex';
  void stamp.offsetWidth;
  stamp.style.transition = 'transform 0.06s steps(1), opacity 0.04s';
  stamp.style.transform = 'scale(1)';
  stamp.style.opacity   = '1';
  shake(false);
}
function stampHide() { stamp.style.display = 'none'; }

function setupChanko() {
  const container = document.getElementById('chanko-container');
  const oscar = document.getElementById('oscar-img');
  const chanko = document.getElementById('chanko-img');
  container.style.display = 'block';
  oscar.src = 'mouth-open.png';
  chanko.style.clipPath = 'inset(0% 0% 0% 0%)';
}

function playChanko() {
  S = 'PLAYING';
  tapCount = 0;
  const oscar = document.getElementById('oscar-img');
  const timerBar = document.getElementById('timer-bar');
  const chanko = document.getElementById('chanko-img');
  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';
  const DURATION = 5000;
  const TARGET = 15;
  requestAnimationFrame(() => {
    timerBar.style.transition = `width ${DURATION}ms linear`;
    timerBar.style.width = '0%';
  });
  gameTimer = setTimeout(() => {
    if (S === 'PLAYING') onLose();
  }, DURATION);
  function onTap(e) {
    e.preventDefault();
    if (S !== 'PLAYING') return;
    tapCount++;
    AudioEngine.playChomp();
    oscar.src = 'mouth-stuffed.png';
    setTimeout(() => { if (S === 'PLAYING') oscar.src = 'mouth-open.png'; }, 100);
    const pct = Math.min(tapCount / TARGET, 1);
    chanko.style.clipPath = `inset(${pct * 48}% 0% 0% 0%)`;
    shake(false);
    if (tapCount >= TARGET) onWin();
  }
  app.addEventListener('touchstart', onTap, { passive: false });
  app.addEventListener('mousedown', onTap);
  app._tap = onTap;
}

function cleanupChanko() {
  clearTimeout(gameTimer);
  if (app._tap) {
    app.removeEventListener('touchstart', app._tap);
    app.removeEventListener('mousedown', app._tap);
    app._tap = null;
  }
  document.getElementById('chanko-container').style.display = 'none';
}

function playShiko() {
  S = 'PLAYING';
  const timerBar = document.getElementById('timer-bar');
  const oscarImg = document.getElementById('shiko-oscar');
  const needle = document.getElementById('meter-needle');
  const stableBar = document.getElementById('stable-bar');
  const centerZone = document.getElementById('meter-zone-center');
  const track = document.getElementById('meter-track');

  const DURATION = 5000;
  const MAX_FAIL_TIME = 1200; 
  const ZONE_WIDTH = 0.3; 

  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';
  requestAnimationFrame(() => {
    timerBar.style.transition = `width ${DURATION}ms linear`;
    timerBar.style.width = '0%';
  });
  let playerPos = 0.5; 
  let targetPos = 0.5; 
  let failTime = 0;
  function updateNeedlePos(clientX) {
    if (S !== 'PLAYING') return;
    const rect = track.getBoundingClientRect();
    let x = (clientX - rect.left) / rect.width;
    playerPos = Math.max(0, Math.min(1, x)); 
    needle.style.left = (playerPos * 100) + '%';
  }

  function onMove(e) {
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    updateNeedlePos(clientX);
  }

  function onDown(e) {
    if (S !== 'PLAYING') return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    updateNeedlePos(clientX);
  }

  app.addEventListener('touchmove', onMove, { passive: false });
  app.addEventListener('mousemove', onMove);
  app.addEventListener('touchstart', onDown, { passive: false });
  app.addEventListener('mousedown', onDown);
  
  app._shikoMove = onMove;
  app._shikoDown = onDown;

  let startTime = performance.now();
  let lastFrame = startTime;
  let lastWobbleTime = 0;
  function tick(now) {
    if (S !== 'PLAYING') return;
    const dt = Math.min(now - lastFrame, 50) / 1000;
    lastFrame = now;
    const elapsed = now - startTime;

    if (elapsed >= DURATION) {
      S = 'WIN_ANIM';
      oscarImg.src = 'oscar-neutral.png'; 
      shake('xl');
      AudioEngine.playSlam();
      doFlash('#ffffff', 200);
      setTimeout(onWin, 500); 
      return;
    }

    const speed = 0.6 + (elapsed / DURATION) * 1.0;
    const t = elapsed * 0.001 * speed;
    
    let rawTarget = 0.5 + (Math.sin(t * Math.PI * 1.0) * 0.25) + (Math.cos(t * Math.PI * 1.6) * 0.15);
    targetPos = Math.max(ZONE_WIDTH/2, Math.min(1 - ZONE_WIDTH/2, rawTarget));
    
    centerZone.style.left = ((targetPos - ZONE_WIDTH/2) * 100) + '%';
    const inZone = Math.abs(playerPos - targetPos) <= (ZONE_WIDTH / 2);
    if (inZone) {
      failTime = Math.max(0, failTime - dt * 2500); 
      oscarImg.src = 'oscar-shiko.png';
      centerZone.style.background = 'rgba(0, 255, 100, 0.25)';
      centerZone.style.boxShadow = 'inset 0 0 8px rgba(0,255,100,0.3)';
      needle.style.background = '#fff';
      needle.style.boxShadow = '0 0 8px #fff, 0 0 16px rgba(255,255,255,0.5)';
    } else {
      failTime += dt * 1000;
      oscarImg.src = 'oscar-shiko-wobble.png';
      centerZone.style.background = 'rgba(255, 0, 0, 0.35)';
      centerZone.style.boxShadow = 'inset 0 0 8px rgba(255,0,0,0.5)';
      needle.style.background = '#ff4444';
      needle.style.boxShadow = '0 0 8px #ff4444, 0 0 16px rgba(255,68,68,0.5)';
      if (now - lastWobbleTime > 300) {
        AudioEngine.playWobble();
        lastWobbleTime = now;
      }
    }

    const failPct = Math.min(failTime / MAX_FAIL_TIME, 1);
    stableBar.style.width = (failPct * 100) + '%';

    if (failPct >= 1) {
      onLose();
      return;
    }

    shikoRAF = requestAnimationFrame(tick);
  }

  shikoRAF = requestAnimationFrame(tick);
}

function cleanupShiko() {
  if (shikoRAF) { cancelAnimationFrame(shikoRAF); shikoRAF = null; }
  
  if (app._shikoMove) {
    app.removeEventListener('touchmove', app._shikoMove);
    app.removeEventListener('mousemove', app._shikoMove);
    app._shikoMove = null;
  }
  if (app._shikoDown) {
    app.removeEventListener('touchstart', app._shikoDown);
    app.removeEventListener('mousedown', app._shikoDown);
    app._shikoDown = null;
  }
  document.getElementById('shiko-container').style.display = 'none';
}

// ===================================================
//  GAME 3: THE THROW (Reflex Tap)
// ===================================================
let throwRAF = null;
function setupThrow() {
  const container = document.getElementById('throw-container');
  const oscar = document.getElementById('throw-oscar');
  const opponent = document.getElementById('throw-opponent');
  const zoneGlow = document.getElementById('throw-zone-glow');
  const feedback = document.getElementById('throw-feedback');

  container.style.display = 'block';
  oscar.src = 'oscar-neutral.png';
  opponent.style.top = '-60%';
  opponent.style.opacity = '1';
  opponent.style.transform = 'translateX(-50%)';
  opponent.className = '';
  feedback.style.display = 'none';
  feedback.style.opacity = '0';

  zoneGlow.style.animation = 'zone-pulse 0.8s ease-in-out infinite alternate';
}

function playThrow() {
  S = 'PLAYING';
  const timerBar = document.getElementById('timer-bar');
  const oscar = document.getElementById('throw-oscar');
  const opponent = document.getElementById('throw-opponent');
  const zone = document.getElementById('throw-zone');
  const feedback = document.getElementById('throw-feedback');

  const FALL_DURATION = 1800; 
  const PRE_DELAY = 600 + Math.random() * 800;
  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';

  let fallStart = null;
  let tapped = false;
  let falling = false;
  function startFall() {
    falling = true;
    fallStart = performance.now();
    requestAnimationFrame(() => {
      timerBar.style.transition = `width ${FALL_DURATION}ms linear`;
      timerBar.style.width = '0%';
    });
    function tick(now) {
      if (S !== 'PLAYING' || tapped) return;
      const elapsed = now - fallStart;
      const progress = Math.min(elapsed / FALL_DURATION, 1);
      const topPct = -60 + (progress * 170);
      opponent.style.top = topPct + '%';
      if (progress >= 1) {
        onLose();
        return;
      }
      throwRAF = requestAnimationFrame(tick);
    }
    throwRAF = requestAnimationFrame(tick);
  }

  gameTimer = setTimeout(startFall, PRE_DELAY);

  function onTap(e) {
    e.preventDefault();
    if (S !== 'PLAYING' || tapped || !falling) return;
    tapped = true;
    const oppRect = opponent.getBoundingClientRect();
    const zoneRect = zone.getBoundingClientRect();

    const feetY = oppRect.bottom - (oppRect.height * 0.05);
    const hitBuffer = 15;

    if (feetY >= (zoneRect.top - hitBuffer) && feetY <= (zoneRect.bottom + hitBuffer)) {
      oscar.src = 'oscar-throw.png';
      AudioEngine.playThrow();
      shake('xl');
      doFlash('rgba(0,229,255,0.4)', 150);

      opponent.className = 'opponent-flung';
      setTimeout(onWin, 600);
    } else {
      AudioEngine.playWhiff();
      shake(false);
      feedback.textContent = feetY < zoneRect.top ? 'TOO EARLY!' : 'TOO LATE!';
      feedback.style.display = 'flex';
      feedback.style.opacity = '1';
      feedback.style.color = '#ff4444';
      setTimeout(() => {
        feedback.style.opacity = '0';
        onLose();
      }, 400);
    }
  }

  app.addEventListener('touchstart', onTap, { passive: false });
  app.addEventListener('mousedown', onTap);
  app._throwTap = onTap;
}

function cleanupThrow() {
  if (throwRAF) { cancelAnimationFrame(throwRAF); throwRAF = null; }
  clearTimeout(gameTimer);
  if (app._throwTap) {
    app.removeEventListener('touchstart', app._throwTap);
    app.removeEventListener('mousedown', app._throwTap);
    app._throwTap = null;
  }
  const opponent = document.getElementById('throw-opponent');
  if (opponent) {
    opponent.className = '';
    opponent.style.top = '-60%';
    opponent.style.opacity = '1';
    opponent.style.transform = 'translateX(-50%)';
  }
  document.getElementById('throw-container').style.display = 'none';
}

// ===================================================
//  GAME 4: TSUPPARI DODGE (Swipe to Safety)
// ===================================================
let dodgeTimeouts = [];

function setupDodge() {
  const container = document.getElementById('dodge-container');
  const oscar = document.getElementById('dodge-oscar');
  const handL = document.getElementById('dodge-hand-left');
  const handR = document.getElementById('dodge-hand-right');
  const waveCounter = document.getElementById('dodge-wave-counter');
  const telegraph = document.getElementById('dodge-telegraph');

  container.style.display = 'block';
  oscar.src = 'oscar-neutral.png';
  oscar.className = '';
  oscar.style.transform = 'translateX(-50%)';
  
  handL.className = 'ghost-hand hand-left';
  handL.style.cssText = ''; 
  
  handR.className = 'ghost-hand hand-right';
  handR.style.cssText = ''; 
  
  waveCounter.textContent = '';
  telegraph.style.opacity = '0';
}

function playDodge() {
  S = 'PLAYING';
  const timerBar = document.getElementById('timer-bar');
  const oscar = document.getElementById('dodge-oscar');
  const handL = document.getElementById('dodge-hand-left');
  const handR = document.getElementById('dodge-hand-right');
  const waveCounter = document.getElementById('dodge-wave-counter');
  const TOTAL_WAVES = 5;
  const DODGES_NEEDED = 3; 
  let currentWave = 0;
  let dodgesHit = 0;
  let dodgesMissed = 0;
  let playerSide = 'center'; 
  let canDodge = false;
  let swipeHandled = false;

  const TOTAL_TIME = 8000;
  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';
  requestAnimationFrame(() => {
    timerBar.style.transition = `width ${TOTAL_TIME}ms linear`;
    timerBar.style.width = '0%';
  });
  waveCounter.textContent = `${dodgesHit}/${DODGES_NEEDED}`;

  let touchStartX = null;
  let touchStartY = null;

  function handleDodge(direction) {
    if (S !== 'PLAYING' || !canDodge || swipeHandled) return;
    swipeHandled = true;
    if (direction === 'left') {
      playerSide = 'left';
      oscar.src = 'oscar-shiko.png'; 
      oscar.className = 'dodge-left';
    } else {
      playerSide = 'right';
      oscar.src = 'oscar-shiko-right.png'; 
      oscar.className = 'dodge-right';
    }
  }

  function onTouchStart(e) {
    if (e.cancelable) e.preventDefault();
    if (S !== 'PLAYING') return;
    const touch = e.touches ? e.touches[0] : e;
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
  }

  // Active swiping to make the trigger instantaneous 
  function onTouchMove(e) {
    if (S !== 'PLAYING' || touchStartX === null || swipeHandled) return;
    if (e.cancelable) e.preventDefault();
    
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;

    // Trigger swipe the moment they cross the 30px threshold
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
      handleDodge(dx < 0 ? 'left' : 'right');
    }
  }

  function onTouchEnd(e) {
    if (e.cancelable) e.preventDefault();
    touchStartX = null;
    touchStartY = null;
  }

  app.addEventListener('touchstart', onTouchStart, { passive: false });
  app.addEventListener('touchmove', onTouchMove, { passive: false });
  app.addEventListener('touchend', onTouchEnd, { passive: false });
  
  app.addEventListener('mousedown', onTouchStart);
  app.addEventListener('mousemove', onTouchMove);
  app.addEventListener('mouseup', onTouchEnd);
  app.addEventListener('mouseleave', onTouchEnd);

  app._dodgeHandlers = { onTouchStart, onTouchMove, onTouchEnd };

  function launchWave() {
    if (S !== 'PLAYING') return;
    if (currentWave >= TOTAL_WAVES) {
      if (dodgesHit >= DODGES_NEEDED) { onWin(); } else { onLose(); }
      return;
    }

    canDodge = true;
    swipeHandled = false;
    playerSide = 'center';
    oscar.src = 'oscar-neutral.png';
    oscar.className = '';
    oscar.style.transform = 'translateX(-50%)';

    const side = Math.random() < 0.5 ? 'left' : 'right'; // Threat side
    const hand = side === 'left' ? handL : handR;
    const otherHand = side === 'left' ? handR : handL;
    const telegraph = document.getElementById('dodge-telegraph');
    
    // We want the player to swipe to the safe side
    const safeSide = side === 'left' ? 'right' : 'left';

    otherHand.className = 'ghost-hand ' + (side === 'left' ? 'hand-right' : 'hand-left');
    const windUpTime = Math.max(360, 600 - currentWave * 60);
    const slamSpeed = Math.max(230, 350 - currentWave * 30);
    const pauseTime = Math.max(300, 600 - currentWave * 75);

    // Show the neon green safe zone + arrows on the side they need to jump to!
    telegraph.className = safeSide === 'left' ? 'tele-left' : 'tele-right';
    telegraph.style.opacity = '1';

    hand.style.transitionProperty = 'top, opacity';
    hand.style.transitionDuration = `${windUpTime}ms, 0.1s`;
    hand.className = 'ghost-hand ' + (side === 'left' ? 'hand-left' : 'hand-right') + ' winding-up';
    
    dodgeTimeouts.push(setTimeout(() => {
      if (S !== 'PLAYING') return;
      
      telegraph.style.opacity = '0';
      hand.style.transitionDuration = `${slamSpeed}ms, 0.1s`;
      hand.className = 'ghost-hand ' + (side === 'left' ? 'hand-left' : 'hand-right') + ' slamming';
      AudioEngine.playWhoosh();

      dodgeTimeouts.push(setTimeout(() => {
        if (S !== 'PLAYING') return;
       
        canDodge = false;

        if (playerSide === safeSide) {
          dodgesHit++;
          AudioEngine.playCoin();
          shake(false);
        } else {
          dodgesMissed++;
          AudioEngine.playBonk();
          shake(true);
          doFlash('rgba(255,0,0,0.35)', 150);
        }

        waveCounter.textContent = `${dodgesHit}/${DODGES_NEEDED}`;
        
        hand.style.transitionProperty = '';
        hand.style.transitionDuration = '';
        hand.className = 'ghost-hand ' + (side === 'left' ? 'hand-left' : 'hand-right') + ' withdrawing';

        currentWave++;

        dodgeTimeouts.push(setTimeout(() => {
          oscar.src = 'oscar-neutral.png';
          oscar.className = '';
          oscar.style.transform = 'translateX(-50%)';
          dodgeTimeouts.push(setTimeout(launchWave, 100)); 
        }, pauseTime));
      }, slamSpeed));

    }, windUpTime));
  }

  dodgeTimeouts.push(setTimeout(launchWave, 400));
}

function cleanupDodge() {
  dodgeTimeouts.forEach(t => clearTimeout(t));
  dodgeTimeouts = [];
  
  if (app._dodgeHandlers) {
    app.removeEventListener('touchstart', app._dodgeHandlers.onTouchStart);
    app.removeEventListener('touchmove', app._dodgeHandlers.onTouchMove);
    app.removeEventListener('touchend', app._dodgeHandlers.onTouchEnd);
    app.removeEventListener('mousedown', app._dodgeHandlers.onTouchStart);
    app.removeEventListener('mousemove', app._dodgeHandlers.onTouchMove);
    app.removeEventListener('mouseup', app._dodgeHandlers.onTouchEnd);
    app.removeEventListener('mouseleave', app._dodgeHandlers.onTouchEnd);
    app._dodgeHandlers = null;
  }
  document.getElementById('dodge-container').style.display = 'none';
}

// ===================================================
//  END SCREENS
// ===================================================
function showDemoComplete() {
  document.getElementById('final-score').textContent = String(score).padStart(3, '0');
  demoEl.classList.add('active');
  const tap = e => { e.preventDefault(); restart(); };
  demoEl.addEventListener('touchstart', tap, { once: true, passive: false });
  demoEl.addEventListener('mousedown',  tap, { once: true });
}
function showGameOver() {
  document.getElementById('go-score').textContent = String(score).padStart(3, '0');
  gameoverEl.classList.add('active');
  const tap = e => { e.preventDefault(); restart(); };
  gameoverEl.addEventListener('touchstart', tap, { once: true, passive: false });
  gameoverEl.addEventListener('mousedown',  tap, { once: true });
}
function restart() {
  demoEl.classList.remove('active');
  gameoverEl.classList.remove('active');
  // Hide all game containers
  document.getElementById('chanko-container').style.display = 'none';
  document.getElementById('shiko-container').style.display = 'none';
  document.getElementById('throw-container').style.display = 'none';
  document.getElementById('dodge-container').style.display = 'none';
  score = 0;
  lives = 4;
  currentGame = 0;
  setScore();
  setHearts();
  showVerbScreen(currentGame);
}
</script>
